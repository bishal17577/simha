<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Orders · Simha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ─── ROOT ─── */
        :root {
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --gold-gradient: linear-gradient(135deg, #c9a84c 0%, #f5e6b8 40%, #c9a84c 70%, #a8892e 100%);
            --bg: #f4f7fb;
            --surface: #ffffff;
            --card: #ffffff;
            --border: #e8ecf0;
            --text: #0d0d0d;
            --text-2: #6b727a;
            --text-3: #a0a7ae;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.08);
            --radius: 16px;
            --transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .dark {
            --bg: #0a0a0a;
            --surface: #141414;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #f5f0eb;
            --text-2: #a8a09a;
            --text-3: #6b6a6a;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
        }
        .app { max-width: 1200px; margin: 0 auto; padding: 0 16px 80px; }

        /* ─── TOP NAV ─── */
        .top-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow);
            border-radius: 0 0 var(--radius) var(--radius);
            margin-bottom: 8px;
        }
        .top-nav .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Playfair Display', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .top-nav .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
            align-items: center;
        }
        .top-nav .nav-links a {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-2);
            transition: all var(--transition);
            padding: 6px 12px;
            border-radius: 50px;
            text-decoration: none;
        }
        .top-nav .nav-links a:hover {
            color: var(--text);
            background: rgba(201,168,76,0.06);
        }
        .top-nav .nav-links a.active {
            color: var(--gold);
            background: rgba(201,168,76,0.08);
        }
        .top-nav .nav-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .top-nav .nav-actions button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-2);
            transition: all var(--transition);
            position: relative;
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
        .top-nav .nav-actions button:hover {
            background: rgba(201,168,76,0.06);
            color: var(--text);
        }
        .top-nav .nav-actions button .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--gold-gradient);
            color: #0a0a0a;
            font-size: 8px;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--surface);
        }
        .top-nav .nav-actions button .badge.show { display: flex; }
        .top-nav .nav-actions .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-2);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .top-nav .nav-actions .theme-toggle:hover {
            background: rgba(201,168,76,0.06);
            color: var(--text);
        }
        .top-nav .nav-actions .profile-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold-gradient);
            color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
            border: 2px solid transparent;
            overflow: hidden;
            text-decoration: none;
        }
        .top-nav .nav-actions .profile-btn:hover {
            transform: scale(1.05);
            border-color: var(--gold);
        }
        .top-nav .nav-actions .profile-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .top-nav .nav-actions .admin-btn {
            padding: 6px 16px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            border-radius: 50px;
            font-weight: 700;
            font-size: 11px;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            text-decoration: none;
        }
        .top-nav .nav-actions .admin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(201,168,76,0.2);
        }

        @media (max-width: 768px) {
            .top-nav .nav-links a { font-size: 11px; padding: 4px 8px; }
            .top-nav .nav-links { gap: 4px; }
            .top-nav .logo { font-size: 16px; }
            .top-nav .nav-actions .admin-btn { font-size: 9px; padding: 4px 12px; }
        }
        @media (max-width: 480px) {
            .top-nav { padding: 0 10px; height: 54px; flex-wrap: wrap; gap: 4px; }
            .top-nav .nav-links { order: 3; width: 100%; justify-content: center; gap: 2px; }
            .top-nav .nav-links a { font-size: 10px; padding: 3px 6px; }
            .top-nav .nav-actions { gap: 2px; }
            .top-nav .nav-actions button { width: 32px; height: 32px; font-size: 15px; }
            .top-nav .nav-actions .profile-btn { width: 30px; height: 30px; font-size: 12px; }
        }

        /* ─── PAGE HEADER ─── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 12px 0 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            position: relative;
        }
        .page-header h1::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 40px;
            height: 2px;
            background: var(--gold-gradient);
            border-radius: 2px;
        }
        .page-header .count-badge {
            font-size: 14px;
            color: var(--text-2);
            background: var(--surface);
            padding: 4px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }
        .page-header .count-badge strong { color: var(--gold); }

        /* ─── FILTER TABS ─── */
        .filter-tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0 12px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .filter-tab {
            flex-shrink: 0;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            box-shadow: var(--shadow);
        }
        .filter-tab:hover {
            border-color: var(--gold);
            color: var(--text);
            transform: translateY(-2px);
        }
        .filter-tab.active {
            background: var(--gold-gradient);
            color: #0a0a0a;
            border-color: var(--gold);
            box-shadow: 0 4px 20px rgba(201,168,76,0.15);
            font-weight: 600;
        }
        .filter-tab .count {
            font-size: 10px;
            opacity: 0.7;
            margin-left: 4px;
        }

        /* ─── ORDER CARDS ─── */
        .order-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 14px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .order-card:hover {
            box-shadow: var(--shadow-md);
            border-color: rgba(201,168,76,0.1);
        }
        .order-card .order-header {
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background var(--transition);
        }
        .order-card .order-header:hover {
            background: rgba(201,168,76,0.02);
        }
        .order-card .order-header .order-id {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            font-family: 'Playfair Display', serif;
        }
        .order-card .order-header .order-date {
            font-size: 12px;
            color: var(--text-2);
        }
        .order-card .order-header .order-status {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 14px;
            border-radius: 50px;
            text-transform: capitalize;
        }
        .order-status.pending   { background: #fef3c7; color: #92400e; }
        .order-status.confirmed { background: #dbeafe; color: #1e40af; }
        .order-status.shipped   { background: #e0f2fe; color: #0369a1; }
        .order-status.delivered { background: #d1fae5; color: #065f46; }
        .order-status.cancelled { background: #fee2e2; color: #991b1b; }
        .dark .order-status.pending   { background: #92400e; color: #fef3c7; }
        .dark .order-status.confirmed { background: #1e40af; color: #dbeafe; }
        .dark .order-status.shipped   { background: #0369a1; color: #e0f2fe; }
        .dark .order-status.delivered { background: #065f46; color: #d1fae5; }
        .dark .order-status.cancelled { background: #991b1b; color: #fee2e2; }

        .order-card .order-body {
            padding: 14px 18px;
            display: none;
            border-bottom: 1px solid var(--border);
        }
        .order-card .order-body.expanded { display: block; }
        .order-card .order-body .order-shop {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text);
            font-family: 'Playfair Display', serif;
        }
        .order-card .order-body .order-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
        }
        .order-card .order-body .order-item:last-of-type { border-bottom: none; }
        .order-card .order-body .order-item img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            background: var(--border);
        }
        .order-card .order-body .order-item .item-details { flex: 1; }
        .order-card .order-body .order-item .item-details .name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
        }
        .order-card .order-body .order-item .item-details .qty {
            font-size: 12px;
            color: var(--text-2);
        }
        .order-card .order-body .order-item .item-price {
            font-weight: 600;
            font-size: 13px;
            color: var(--gold);
        }

        /* ─── TRACKING STEPPER ─── */
        .tracking-stepper {
            padding: 8px 0 4px;
            margin-top: 8px;
            border-top: 1px solid var(--border);
        }
        .tracking-step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 6px 0;
            position: relative;
        }
        .tracking-step .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
            margin-top: 2px;
            border: 2px solid var(--border);
            transition: all 0.3s;
        }
        .tracking-step .step-dot.active {
            background: var(--gold);
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201,168,76,0.15);
        }
        .tracking-step .step-dot.completed {
            background: var(--gold);
            border-color: var(--gold);
        }
        .tracking-step .step-dot.inactive { opacity: 0.4; }
        .tracking-step .step-line {
            position: absolute;
            left: 5px;
            top: 22px;
            width: 2px;
            height: 16px;
            background: var(--border);
        }
        .tracking-step:last-child .step-line { display: none; }
        .tracking-step .step-label { font-size: 13px; color: var(--text); }
        .tracking-step .step-label .step-date {
            font-size: 11px;
            color: var(--text-2);
            display: block;
        }

        /* ─── ORDER FOOTER ─── */
        .order-card .order-footer {
            padding: 10px 18px;
            background: var(--bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid var(--border);
        }
        .order-card .order-footer .total {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
        }
        .order-card .order-footer .total span { color: var(--gold); }
        .order-card .order-footer .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        /* ─── BUTTONS ─── */
        .btn-primary {
            padding: 8px 18px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 20px rgba(201,168,76,0.1);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201,168,76,0.2);
        }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn-secondary {
            padding: 8px 18px;
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-weight: 500;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .btn-secondary:hover {
            border-color: var(--gold);
            background: rgba(201,168,76,0.04);
            transform: translateY(-2px);
        }

        .btn-danger {
            padding: 8px 18px;
            background: #dc2626;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .btn-danger:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(220,38,38,0.2);
        }
        .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .btn-whatsapp-order {
            padding: 8px 18px;
            background: #25D366;
            color: #fff;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-whatsapp-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(37,211,102,0.2);
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-2);
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
        .empty-state h2 {
            color: var(--text);
            font-size: 22px;
            font-family: 'Playfair Display', serif;
            margin-bottom: 4px;
        }
        .empty-state p { font-size: 14px; margin-bottom: 16px; }

        /* ─── TOAST ─── */
        #toastContainer {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            pointer-events: none;
        }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            font-size: 13px;
            font-weight: 500;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
            animation: slideUp 0.3s ease;
        }
        .toast.error { border-color: #dc2626; }
        .toast.warning { border-color: #f59e0b; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── BOTTOM NAV ─── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 58px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 4px 0 8px;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .bn-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-size: 9px;
            font-weight: 500;
            color: var(--text-2);
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            min-width: 44px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all var(--transition);
            position: relative;
        }
        .bn-item .bn-icon { font-size: 20px; }
        .bn-item.active { color: var(--gold); }
        .bn-item:hover { color: var(--text); }
        .bn-item .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            font-size: 8px;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        .bn-item .badge.show { display: flex; }
        @media (min-width: 768px) { .bottom-nav { display: none !important; } }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .order-card .order-footer {
                flex-direction: column;
                align-items: stretch;
            }
            .order-card .order-footer .actions {
                justify-content: center;
            }
            .order-card .order-footer .btn-primary,
            .order-card .order-footer .btn-secondary,
            .order-card .order-footer .btn-danger,
            .order-card .order-footer .btn-whatsapp-order {
                flex: 1;
                text-align: center;
                justify-content: center;
            }
            .page-header h1 { font-size: 22px; }
        }
        @media (max-width: 480px) {
            .order-card .order-header .order-id { font-size: 12px; }
            .order-card .order-body .order-item img { width: 32px; height: 32px; }
            .order-card .order-body .order-item .item-details .name { font-size: 12px; }
            .filter-tab { font-size: 10px; padding: 4px 12px; }
        }
    </style>
</head>
<body>

<div class="app">

    <!-- ─── TOP NAV ─── -->
    <nav class="top-nav">
        <div class="logo">SIMHA</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop-listing.html">Shops</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li><a href="orders.html" class="active">Orders</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
        <div class="nav-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
            <button onclick="window.location.href='notifications.html'" aria-label="Notifications">
                🔔
                <span class="badge" id="notifBadge">0</span>
            </button>
            <a href="profile.html" class="profile-btn" id="profileAvatar">👤</a>
            <a href="admin.html" class="admin-btn">Admin</a>
        </div>
    </nav>

    <!-- ─── PAGE HEADER ─── -->
    <div class="page-header">
        <h1>📋 My Orders</h1>
        <span class="count-badge" id="totalOrdersBadge"><strong id="totalCount">0</strong> orders</span>
    </div>

    <!-- ─── FILTER TABS ─── -->
    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All <span class="count" id="countAll">0</span></button>
        <button class="filter-tab" data-filter="pending">⏳ Pending <span class="count" id="countPending">0</span></button>
        <button class="filter-tab" data-filter="confirmed">✅ Confirmed <span class="count" id="countConfirmed">0</span></button>
        <button class="filter-tab" data-filter="shipped">📦 Shipped <span class="count" id="countShipped">0</span></button>
        <button class="filter-tab" data-filter="delivered">🏠 Delivered <span class="count" id="countDelivered">0</span></button>

    <div id="ordersList">
        <div class="empty-state">
            <span class="emoji">📋</span>

        </div>
    </div>

    <!-- ─── LOAD MORE ─── -->
    <div style="text-align:center;padding:16px 0 24px;">

        </button>
        <button class="bn-item" onclick="window.location.href='shop-listing.html'">
            <span class="bn-icon">🏪</span>Shops
        </button>
        <button class="bn-item" onclick="window.location.href='cart.html'">
            <span class="bn-icon">🛒</span>Cart
            <span class="badge" id="cartBadge">0</span>

<!-- ─── TOAST ─── -->
<div id="toastContainer"></div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
    }
}
</script>

<script type="module">
import { initializeApp } from 'firebase/app';
import { getAuth, onAuthStateChanged } from 'firebase/auth';
import {
    getFirestore, collection, doc, getDocs, getDoc, updateDoc, setDoc,
    query, where, onSnapshot, serverTimestamp, runTransaction
} from 'firebase/firestore';

const firebaseConfig = {
    apiKey: "AIzaSyDJLnUB8XnXWPEtSRAMuQr9ASmD16HLIJc",
    authDomain: "bishalshrestha17-de676.firebaseapp.com",
    projectId: "bishalshrestha17-de676",
    storageBucket: "bishalshrestha17-de676.firebasestorage.app",
    messagingSenderId: "631628771230",
    appId: "1:631628771230:web:389c6430535f6a46b6708f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── STATE ───
let allOrdersData = [];
let displayedOrders = [];
let currentFilter = 'all';
let unsubscribeOrders = null;
let isDark = false;
const PAGE_SIZE = 10;

// ─── DOM REFS ───
const ordersList = document.getElementById('ordersList');
const loadMoreBtn = document.getElementById('loadMoreBtn');
const cartBadge = document.getElementById('cartBadge');
const notifBadge = document.getElementById('notifBadge');
const profileAvatar = document.getElementById('profileAvatar');
const themeToggle = document.getElementById('themeToggle');
const totalCount = document.getElementById('totalCount');

// ─── THEME ───
function toggleTheme() {
    isDark = !isDark;
    document.documentElement.classList.toggle('dark', isDark);
    themeToggle.textContent = isDark ? '☀️' : '🌓';
    localStorage.setItem('simhaTheme', isDark ? 'dark' : 'light');
}
themeToggle.addEventListener('click', toggleTheme);

if (localStorage.getItem('simhaTheme') === 'dark') {
    isDark = true;
    document.documentElement.classList.add('dark');
    themeToggle.textContent = '☀️';
}

// ─── TOAST ───
function showToast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️' };
    t.innerHTML = `<span>${icons[type]||'ℹ️'}</span> ${msg}`;
    c.appendChild(t);
    setTimeout(() => {
        t.style.transition = 'opacity 0.3s,transform 0.3s';
        t.style.opacity = '0';
        t.style.transform = 'translateY(10px)';
        setTimeout(() => t.remove(), 300);
    }, 2500);
}
window.showToast = showToast;

// ─── DATE FORMATTER ───
function formatDate(ts) {
    if (!ts) return 'N/A';
    let d;
    if (ts.toDate) d = ts.toDate();
    else if (ts.seconds) d = new Date(ts.seconds * 1000);
    else d = new Date(ts);
    if (isNaN(d.getTime())) return 'N/A';
    return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

// ─── TRACKING STEPS ───
function getTrackingSteps(status, createdAt, deliveredAt) {
    const steps = [
        { label: 'Order Placed', date: createdAt },
        { label: 'Confirmed', date: ['confirmed','shipped','delivered'].includes(status) ? createdAt : null },
        { label: 'Shipped', date: ['shipped','delivered'].includes(status) ? createdAt : null },
        { label: 'Delivered', date: deliveredAt || null }
    ];
    const idx = { pending:0, confirmed:1, shipped:2, delivered:3, cancelled:-1 }[status] ?? 0;

    steps.forEach((s, i) => {
        if (status === 'cancelled') s.dotClass = i === 0 ? 'completed' : 'inactive';
        else if (i < idx) s.dotClass = 'completed';
        else if (i === idx) s.dotClass = status === 'delivered' ? 'completed' : 'active';
        else s.dotClass = 'inactive';
    });

    return steps.map((s, i) => `
        <div class="tracking-step">
            <div class="step-dot ${s.dotClass}"></div>
            ${i < steps.length - 1 ? '<div class="step-line"></div>' : ''}
            <div class="step-label">
                ${s.label}
                ${s.date ? `<span class="step-date">${formatDate(s.date)}</span>` : ''}
            </div>
        </div>`).join('');
}

// ─── BUILD WHATSAPP MESSAGE ───
function buildWhatsAppOrderMessage(order) {
    const customerName = order.customerName || 'N/A';
    const customerPhone = order.customerPhone || 'N/A';
    const customerEmail = order.customerEmail || 'N/A';
    const deliveryAddress = order.deliveryAddress || 'N/A';
    const district = order.district || 'N/A';
    const shopName = order.shopName || 'Shop';
    const orderId = order.orderId || order.id;
    const total = order.totalAmount || 0;

    const itemsList = (order.items || []).map(item => {
        const itemTotal = (item.price || 0) * (item.qty || 0);
        return `   • ${item.productName || 'Product'} ×${item.qty || 0} ${item.unit || ''} = Rs. ${itemTotal.toLocaleString()}`;
    }).join('\n');

    const itemCount = (order.items || []).length;
    const location = order.customerLocation;
    const mapsLink = location && location.lat && location.lng 
        ? `https://maps.google.com/?q=${location.lat},${location.lng}` : 'Not shared';

    return `🛍️ *ORDER DETAILS - Simha*\n\n` +
           `━━━━━━━━━━━━━━━━━━━━\n` +
           `📋 Order ID: *${orderId}*\n` +
           `📅 Date: ${formatDate(order.createdAt)}\n` +
           `📌 Status: ${(order.status || 'Pending').toUpperCase()}\n\n` +
           `👤 *CUSTOMER*\n` +
           `   Name: ${customerName}\n` +
           `   📞 Phone: ${customerPhone}\n` +
           `   📧 Email: ${customerEmail}\n` +
           `   📍 District: ${district}\n` +
           `   🏠 Address: ${deliveryAddress}\n\n` +
           `📍 *LOCATION*\n` +
           `   ${mapsLink}\n\n` +
           `🏪 *SHOP*\n` +
           `   ${shopName}\n` +
           `   📞 WhatsApp: ${order.shopWhatsapp || 'N/A'}\n\n` +
           `📦 *ITEMS (${itemCount})*\n` +
           `${itemsList}\n\n` +
           `💰 *TOTAL: Rs. ${total.toLocaleString()}*\n` +
           `━━━━━━━━━━━━━━━━━━━━\n\n` +
           `_Placed via Simha App_ 🙏`;
}

// ─── SEND ORDER DETAILS TO WHATSAPP ───
window.sendOrderToWhatsApp = async function(orderId) {
    const order = allOrdersData.find(o => o.id === orderId || o.orderId === orderId);
    if (!order) { showToast('Order not found', 'error'); return; }
    if (!order.shopWhatsapp) { showToast('Shop WhatsApp not available', 'error'); return; }

    try {
        const message = buildWhatsAppOrderMessage(order);
        const phone = order.shopWhatsapp.replace(/\D/g, '');
        const url = `https://wa.me/977${phone}?text=${encodeURIComponent(message)}`;
        if (confirm(`Send order details to ${order.shopName || 'Shop'} on WhatsApp?`)) {
            window.open(url, '_blank');
            showToast('Opening WhatsApp...', 'success');
        }
    } catch (error) {
        showToast('Failed to open WhatsApp', 'error');
    }
};

// ─── RENDER ORDERS ───
function renderOrders(orders) {
    if (orders.length === 0) {
        ordersList.innerHTML = `
            <div class="empty-state">
                <span class="emoji">📋</span>
                <h2>No orders found</h2>
                <p>${currentFilter === 'all' ? 'Place your first order!' : `No ${currentFilter} orders`}</p>
                <button class="btn-primary" onclick="window.location.href='shop-listing.html'">Browse Shops →</button>
            </div>`;
        return;
    }

    ordersList.innerHTML = orders.map(order => {
        const canCancel = !['cancelled','delivered'].includes(order.status);
        const isPendingOrCancelled = ['pending','cancelled'].includes(order.status);
        const canWhatsApp = order.shopWhatsapp && order.status !== 'cancelled';
        
        return `
        <div class="order-card">
            <div class="order-header" onclick="toggleOrder('${order.id}')">
                <div>
                    <div class="order-id">${order.orderId || '#' + order.id.slice(0,8).toUpperCase()}</div>
                    <div class="order-date">${formatDate(order.createdAt)}</div>
                </div>
                <span class="order-status ${order.status || 'pending'}">${order.status || 'pending'}</span>
            </div>

            <div class="order-body" id="orderBody_${order.id}">
                <div class="order-shop">🏪 ${order.shopName || 'Shop'}</div>
                ${(order.items || []).map(item => `
                    <div class="order-item">
                        <img src="${item.imageURL || ''}" alt="${item.productName || ''}"
                             onerror="this.src='https://picsum.photos/40/40'">
                        <div class="item-details">
                            <div class="name">${item.productName || 'Product'}</div>
                            <div class="qty">×${item.qty || 0} ${item.unit || ''}</div>
                        </div>
                        <div class="item-price">Rs. ${((item.price||0)*(item.qty||0)).toLocaleString()}</div>
                    </div>`).join('') || '<p style="color:var(--text-2);font-size:13px;">No items</p>'}

                <div class="tracking-stepper">
                    ${getTrackingSteps(order.status, order.createdAt, order.deliveredAt)}
                </div>

                ${order.cancelledAt ? `
                    <div style="margin-top:8px;padding:8px;background:#fee2e2;border-radius:6px;font-size:12px;color:#991b1b;">
                        Cancelled on: ${formatDate(order.cancelledAt)}
                    </div>` : ''}
                    
                ${order.customerLocation && order.customerLocation.lat ? `
                    <div style="margin-top:8px;padding:8px;background:#f0f7ff;border-radius:6px;font-size:12px;color:#1a5a8a;">
                        📍 Location: ${order.customerLocation.lat.toFixed(6)}, ${order.customerLocation.lng.toFixed(6)}
                        <a href="https://maps.google.com/?q=${order.customerLocation.lat},${order.customerLocation.lng}" 
                           target="_blank" style="display:inline-block;margin-left:8px;color:var(--gold);font-weight:600;">View Map</a>
                    </div>` : ''}
            </div>

            <div class="order-footer">
                <span class="total">Total: <span>Rs. ${(order.totalAmount||0).toLocaleString()}</span></span>
                <div class="actions">
                    ${canWhatsApp ? `
                        <button class="btn-whatsapp-order" onclick="sendOrderToWhatsApp('${order.id}')">
                            💬 Send Details
                        </button>` : ''}
                    ${canCancel ? `
                        <button class="btn-danger" data-cancel="${order.id}"
                                onclick="cancelOrder('${order.id}')">❌ Cancel</button>` : ''}
                    ${isPendingOrCancelled ? `
                        <button class="btn-secondary" onclick="reorder('${order.id}')">🔄 Reorder</button>` : ''}
                    <button class="btn-secondary" onclick="toggleOrder('${order.id}')">📄 Details</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

// ─── TOGGLE ORDER BODY ───
window.toggleOrder = (id) => {
    document.getElementById(`orderBody_${id}`)?.classList.toggle('expanded');
};

// ─── APPLY FILTER ───
function applyFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.filter === filter);
    });

    const filtered = filter === 'all'
        ? allOrdersData
        : allOrdersData.filter(o => o.status === filter);

    displayedOrders = filtered.slice(0, PAGE_SIZE);
    renderOrders(displayedOrders);

    if (filtered.length > PAGE_SIZE) {
        loadMoreBtn.style.display = 'inline-block';
        loadMoreBtn.dataset.total = filtered.length;
    } else {
        loadMoreBtn.style.display = 'none';
    }
}

document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => applyFilter(tab.dataset.filter));
});

// ─── LOAD MORE ───
loadMoreBtn.addEventListener('click', () => {
    const filtered = currentFilter === 'all'
        ? allOrdersData
        : allOrdersData.filter(o => o.status === currentFilter);

    const next = filtered.slice(displayedOrders.length, displayedOrders.length + PAGE_SIZE);
    displayedOrders = [...displayedOrders, ...next];
    renderOrders(displayedOrders);

    if (displayedOrders.length >= filtered.length) {
        loadMoreBtn.style.display = 'none';
    }
});

// ─── UPDATE COUNT BADGES ───
function updateCounts() {
    const total = allOrdersData.length;
    totalCount.textContent = total;
    document.getElementById('countAll').textContent = total;

    ['pending','confirmed','shipped','delivered','cancelled'].forEach(s => {
        const el = document.getElementById(`count${s.charAt(0).toUpperCase()+s.slice(1)}`);
        if (el) el.textContent = allOrdersData.filter(o => o.status === s).length;
    });
}

// ─── CANCEL ORDER ───
window.cancelOrder = async function(orderId) {
    if (!confirm('⚠️ Cancel this order?')) return;

    const order = allOrdersData.find(o => o.id === orderId);
    if (!order) { showToast('Order not found', 'error'); return; }
    if (order.status === 'cancelled') { showToast('Already cancelled', 'warning'); return; }
    if (order.status === 'delivered') { showToast('Cannot cancel delivered order', 'error'); return; }

    const btn = document.querySelector(`[data-cancel="${orderId}"]`);
    if (btn) { btn.disabled = true; btn.textContent = 'Cancelling…'; }

    try {
        await runTransaction(db, async (tx) => {
            const orderRef = doc(db, 'orders', orderId);
            const orderSnap = await tx.get(orderRef);
            if (!orderSnap.exists()) throw new Error('Order not found');
            const data = orderSnap.data();
            if (data.status === 'cancelled') throw new Error('Already cancelled');
            if (data.status === 'delivered') throw new Error('Cannot cancel delivered order');

            const items = data.items || [];
            const productSnaps = await Promise.all(
                items.map(item => tx.get(doc(db, 'products', item.productId)))
            );

            tx.update(orderRef, {
                status: 'cancelled',
                cancelledAt: serverTimestamp(),
                updatedAt: serverTimestamp()
            });

            productSnaps.forEach((snap, i) => {
                if (snap.exists()) {
                    tx.update(snap.ref, {
                        stock: (snap.data().stock || 0) + (items[i].qty || 0),
                        updatedAt: serverTimestamp()
                    });
                }
            });
        });

        showToast('✅ Order cancelled. Stock restored.', 'success');
    } catch (err) {
        showToast('Failed to cancel: ' + err.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '❌ Cancel'; }
    }
};

// ─── REORDER ───
window.reorder = async function(orderId) {
    const order = allOrdersData.find(o => o.id === orderId);
    if (!order?.items?.length) { showToast('No items to reorder', 'error'); return; }
    const user = auth.currentUser;
    if (!user) { showToast('Please login first', 'error'); return; }

    try {
        const cartRef = doc(db, 'cart', user.uid);
        const cartSnap = await getDoc(cartRef);
        const existing = cartSnap.exists() ? (cartSnap.data().items || []) : [];
        const merged = [...existing];

        for (const item of order.items) {
            const idx = merged.findIndex(i => i.productId === item.productId);
            if (idx >= 0) merged[idx].qty += item.qty || 0;
            else merged.push({
                productId: item.productId,
                shopId: order.shopId,
                shopName: order.shopName || 'Shop',
                productName: item.productName,
                price: item.price,
                qty: item.qty || 0,
                unit: item.unit || '',
                imageURL: item.imageURL || ''
            });
        }

        if (cartSnap.exists()) {
            await updateDoc(cartRef, { items: merged, updatedAt: serverTimestamp() });
        } else {
            await setDoc(cartRef, { items: merged, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
        }

        showToast('Added to cart! 🛒', 'success');
        window.location.href = 'cart.html';
    } catch (err) {
        showToast('Failed to reorder', 'error');
    }
};

// ─── REALTIME ORDERS LISTENER ───
function setupRealtimeListener(user) {
    if (unsubscribeOrders) { unsubscribeOrders(); unsubscribeOrders = null; }

    const q = query(collection(db, 'orders'), where('customerId', '==', user.uid));

    unsubscribeOrders = onSnapshot(q, (snapshot) => {
        const orders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        orders.sort((a, b) => {
            const da = a.createdAt?.toDate?.() || new Date(0);
            const db_ = b.createdAt?.toDate?.() || new Date(0);
            return db_ - da;
        });

        allOrdersData = orders;
        updateCounts();
        applyFilter(currentFilter);
    }, (err) => {
        console.error('Orders listener error:', err);
        showToast('Error loading orders', 'error');
    });
}

// ─── BADGES ───
async function updateCartBadge() {
    const user = auth.currentUser;
    if (!user) { cartBadge.classList.remove('show'); return; }
    try {
        const c = await getDoc(doc(db, 'cart', user.uid));
        const count = c.exists() ? (c.data().items || []).reduce((s, i) => s + (i.qty || 0), 0) : 0;
        cartBadge.textContent = count > 99 ? '99+' : count;
        cartBadge.classList.toggle('show', count > 0);
    } catch {}
}

async function updateNotifBadge() {
    const user = auth.currentUser;
    if (!user) { notifBadge.classList.remove('show'); return; }
    try {
        const ud = await getDoc(doc(db, 'users', user.uid));
        if (!ud.exists()) return;
        const read = ud.data().readNotifications || [];
        const ns = await getDocs(query(collection(db, 'notifications'), where('isActive','==',true)));
        const unread = ns.size - read.length;
        notifBadge.textContent = unread > 99 ? '99+' : unread;
        notifBadge.classList.toggle('show', unread > 0);
    } catch {}
}

function updateProfile(user) {
    if (user) {
        const name = user.displayName || user.email || 'User';
        const initial = name.charAt(0).toUpperCase();
        if (user.photoURL) {
            profileAvatar.innerHTML = `<img src="${user.photoURL}" alt="${name}">`;
        } else {
            profileAvatar.textContent = initial;
        }
    } else {
        profileAvatar.textContent = '👤';
    }
}

// ─── AUTH ───
onAuthStateChanged(auth, (user) => {
    updateProfile(user);
    if (user) {
        setupRealtimeListener(user);
        updateCartBadge();
        updateNotifBadge();
    } else {
        window.location.href = 'auth.html';
    }
});

console.log('🚀 Orders Page — Premium Design with Real-time Updates');
</script>
