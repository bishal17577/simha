<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Cart · Simha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ─── ROOT ─── */
        :root {
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --gold-gradient: linear-gradient(135deg, #c9a84c 0%, #f5e6b8 40%, #c9a84c 70%, #a8892e 100%);
            --bg: #f4f7fb;
            --surface: #ffffff;
            --card: #ffffff;
            --border: #e8ecf0;
            --text: #0d0d0d;
            --text-2: #6b727a;
            --text-3: #a0a7ae;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.08);
            --radius: 16px;
            --transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .dark {
            --bg: #0a0a0a;
            --surface: #141414;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #f5f0eb;
            --text-2: #a8a09a;
            --text-3: #6b6a6a;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
        }
        .app { max-width: 1200px; margin: 0 auto; padding: 0 16px 80px; }

        /* ─── TOP NAV ─── */
        .top-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow);
            border-radius: 0 0 var(--radius) var(--radius);
            margin-bottom: 8px;
        }
        .top-nav .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Playfair Display', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .top-nav .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
            align-items: center;
        }
        .top-nav .nav-links a {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-2);
            transition: all var(--transition);
            padding: 6px 12px;
            border-radius: 50px;
            text-decoration: none;
        }
        .top-nav .nav-links a:hover {
            color: var(--text);
            background: rgba(201,168,76,0.06);
        }
        .top-nav .nav-links a.active {
            color: var(--gold);
            background: rgba(201,168,76,0.08);
        }
        .top-nav .nav-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .top-nav .nav-actions button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-2);
            transition: all var(--transition);
            position: relative;
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
        .top-nav .nav-actions button:hover {
            background: rgba(201,168,76,0.06);
            color: var(--text);
        }
        .top-nav .nav-actions button .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--gold-gradient);
            color: #0a0a0a;
            font-size: 8px;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--surface);
        }
        .top-nav .nav-actions button .badge.show { display: flex; }
        .top-nav .nav-actions .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-2);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .top-nav .nav-actions .theme-toggle:hover {
            background: rgba(201,168,76,0.06);
            color: var(--text);
        }
        .top-nav .nav-actions .profile-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold-gradient);
            color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
            border: 2px solid transparent;
            overflow: hidden;
            text-decoration: none;
        }
        .top-nav .nav-actions .profile-btn:hover {
            transform: scale(1.05);
            border-color: var(--gold);
        }
        .top-nav .nav-actions .profile-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .top-nav .nav-actions .admin-btn {
            padding: 6px 16px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            border-radius: 50px;
            font-weight: 700;
            font-size: 11px;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            text-decoration: none;
        }
        .top-nav .nav-actions .admin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(201,168,76,0.2);
        }

        @media (max-width: 768px) {
            .top-nav .nav-links a { font-size: 11px; padding: 4px 8px; }
            .top-nav .nav-links { gap: 4px; }
            .top-nav .logo { font-size: 16px; }
            .top-nav .nav-actions .admin-btn { font-size: 9px; padding: 4px 12px; }
        }
        @media (max-width: 480px) {
            .top-nav { padding: 0 10px; height: 54px; flex-wrap: wrap; gap: 4px; }
            .top-nav .nav-links { order: 3; width: 100%; justify-content: center; gap: 2px; }
            .top-nav .nav-links a { font-size: 10px; padding: 3px 6px; }
            .top-nav .nav-actions { gap: 2px; }
            .top-nav .nav-actions button { width: 32px; height: 32px; font-size: 15px; }
            .top-nav .nav-actions .profile-btn { width: 30px; height: 30px; font-size: 12px; }
        }

        /* ─── PAGE HEADER ─── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 12px 0 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            position: relative;
        }
        .page-header h1::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 40px;
            height: 2px;
            background: var(--gold-gradient);
            border-radius: 2px;
        }
        .page-header .item-count {
            font-size: 14px;
            color: var(--text-2);
            background: var(--surface);
            padding: 4px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }
        .page-header .item-count strong { color: var(--gold); }

        /* ─── CART SECTION ─── */
        .cart-section {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all var(--transition);
        }
        .cart-section:hover {
            box-shadow: var(--shadow-md);
        }
        .cart-section .section-header {
            background: var(--gold-gradient);
            color: #0a0a0a;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .cart-section .section-header .shop-name {
            font-weight: 700;
            font-size: 16px;
            font-family: 'Playfair Display', serif;
        }
        .cart-section .section-header .shop-whatsapp {
            font-size: 12px;
            opacity: 0.8;
            background: rgba(0,0,0,0.08);
            padding: 2px 12px;
            border-radius: 50px;
        }

        /* ─── CART ITEMS ─── */
        .cart-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            transition: all var(--transition);
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .cart-item:hover {
            background: rgba(201,168,76,0.02);
        }
        .cart-item .item-image {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            background: var(--border);
            flex-shrink: 0;
            overflow: hidden;
        }
        .cart-item .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition);
        }
        .cart-item:hover .item-image img {
            transform: scale(1.05);
        }
        .cart-item .item-info {
            flex: 1;
        }
        .cart-item .item-info .name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }
        .cart-item .item-info .unit {
            font-size: 12px;
            color: var(--text-2);
        }
        .cart-item .item-info .price {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
        }
        .cart-item .item-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cart-item .item-actions .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
            transition: all var(--transition);
            background: var(--surface);
            color: var(--text);
        }
        .cart-item .item-actions .qty-btn:hover:not(:disabled) {
            border-color: var(--gold);
            background: rgba(201,168,76,0.06);
            transform: scale(1.05);
        }
        .cart-item .item-actions .qty-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        .cart-item .item-actions .qty {
            font-weight: 600;
            font-size: 14px;
            min-width: 24px;
            text-align: center;
            color: var(--text);
        }
        .cart-item .item-actions .remove-btn {
            color: #dc2626;
            font-size: 18px;
            padding: 4px;
            transition: all var(--transition);
            background: none;
            border: none;
            cursor: pointer;
        }
        .cart-item .item-actions .remove-btn:hover {
            transform: scale(1.2) rotate(90deg);
        }
        .cart-item .subtotal {
            font-size: 14px;
            font-weight: 600;
            min-width: 80px;
            text-align: right;
            color: var(--text);
        }

        /* ─── SECTION FOOTER ─── */
        .section-footer {
            padding: 12px 16px;
            background: var(--bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px solid var(--border);
        }
        .section-footer .total {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
        }
        .section-footer .total span { color: var(--gold); }
        .btn-primary {
            padding: 10px 28px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 20px rgba(201,168,76,0.15);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 40px rgba(201,168,76,0.25);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            padding: 10px 28px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .btn-secondary:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        /* ─── EMPTY CART ─── */
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-2);
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        .empty-cart .emoji {
            font-size: 64px;
            display: block;
            margin-bottom: 16px;
        }
        .empty-cart h2 {
            color: var(--text);
            font-size: 24px;
            font-family: 'Playfair Display', serif;
            margin-bottom: 4px;
        }
        .empty-cart p {
            font-size: 14px;
            margin-bottom: 20px;
        }
        .empty-cart .btn-primary {
            display: inline-block;
        }

        /* ─── GRAND TOTAL ─── */
        .grand-total {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            box-shadow: var(--shadow);
            margin-top: 16px;
        }
        .grand-total .label {
            font-size: 18px;
            font-weight: 600;
            font-family: 'Playfair Display', serif;
            color: var(--text);
        }
        .grand-total .amount {
            font-size: 28px;
            font-weight: 800;
            color: var(--gold);
        }

        /* ─── TOAST ─── */
        #toastContainer {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            pointer-events: none;
        }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            font-size: 13px;
            font-weight: 500;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
            animation: slideUp 0.3s ease;
        }
        .toast.error { border-color: #dc2626; }
        .toast.warning { border-color: #f59e0b; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── BOTTOM NAV ─── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 58px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 4px 0 8px;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .bn-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-size: 9px;
            font-weight: 500;
            color: var(--text-2);
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            min-width: 44px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all var(--transition);
            position: relative;
        }
        .bn-item .bn-icon { font-size: 20px; }
        .bn-item.active { color: var(--gold); }
        .bn-item:hover { color: var(--text); }
        .bn-item .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            font-size: 8px;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        .bn-item .badge.show { display: flex; }
        @media (min-width: 768px) { .bottom-nav { display: none !important; } }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            .cart-item {
                flex-wrap: wrap;
                gap: 8px;
            }
            .cart-item .subtotal {
                min-width: auto;
                text-align: left;
                margin-left: auto;
            }
            .section-footer {
                flex-direction: column;
                align-items: stretch;
            }
            .section-footer .btn-primary {
                width: 100%;
                text-align: center;
            }
            .grand-total {
                flex-direction: column;
                text-align: center;
            }
            .page-header h1 { font-size: 22px; }
        }
        @media (max-width: 480px) {
            .cart-item .item-image { width: 48px; height: 48px; }
            .cart-item .item-info .name { font-size: 13px; }
            .cart-item .item-actions .qty-btn { width: 24px; height: 24px; font-size: 14px; }
            .cart-item .subtotal { font-size: 13px; }
            .grand-total .amount { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="app">

    <!-- ─── TOP NAV ─── -->
    <nav class="top-nav">
        <div class="logo">SIMHA</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop-listing.html">Shops</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li><a href="orders.html">Orders</a></li>
            <li><a href="cart.html" class="active">Cart</a></li>
        </ul>
        <div class="nav-actions">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌓</button>
            <button onclick="window.location.href='notifications.html'" aria-label="Notifications">
                🔔
                <span class="badge" id="notifBadge">0</span>
            </button>
            <a href="profile.html" class="profile-btn" id="profileAvatar">👤</a>
            <a href="admin.html" class="admin-btn">Admin</a>
        </div>
    </nav>

    <!-- ─── PAGE HEADER ─── -->
    <div class="page-header">
        <h1>🛒 Your Cart</h1>
        <span class="item-count" id="itemCount">0 items</span>
    </div>

    <!-- ─── CART CONTENT ─── -->
    <div id="cartContent">
        <div class="empty-cart">
            <span class="emoji">🛒</span>
            <h2>Your cart is empty</h2>
            <p>Browse shops and add products you love.</p>
            <a href="shop-listing.html" class="btn-primary">Browse Shops →</a>
        </div>
    </div>

    <!-- ─── GRAND TOTAL ─── -->
    <div id="grandTotalContainer" style="display:none;">
        <div class="grand-total">
            <span class="label">Grand Total</span>
            <span class="amount" id="grandTotal">Rs. 0</span>
        </div>
    </div>

    <!-- ─── BOTTOM NAV ─── -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="bn-item" onclick="window.location.href='index.html'">
            <span class="bn-icon">🏠</span>Home
        </button>
        <button class="bn-item" onclick="window.location.href='shop-listing.html'">
            <span class="bn-icon">🏪</span>Shops
        </button>
        <button class="bn-item active" onclick="window.location.href='cart.html'">
            <span class="bn-icon">🛒</span>Cart
            <span class="badge" id="cartBadge">0</span>
        </button>
        <button class="bn-item" onclick="window.location.href='orders.html'">
            <span class="bn-icon">📋</span>Orders
        </button>
        <button class="bn-item" onclick="window.location.href='profile.html'">
            <span class="bn-icon">👤</span>Profile
        </button>
    </nav>

</div>

<!-- ─── TOAST ─── -->
<div id="toastContainer"></div>

    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",

</script>

<script type="module">

import { getAuth, onAuthStateChanged } from 'firebase/auth';
import { getFirestore, doc, getDoc, updateDoc, onSnapshot, serverTimestamp } from 'firebase/firestore';

const firebaseConfig = {
    apiKey: "AIzaSyDJLnUB8XnXWPEtSRAMuQr9ASmD16HLIJc",
    authDomain: "bishalshrestha17-de676.firebaseapp.com",
    projectId: "bishalshrestha17-de676",
    storageBucket: "bishalshrestha17-de676.firebasestorage.app",
    messagingSenderId: "631628771230",
    appId: "1:631628771230:web:389c6430535f6a46b6708f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── STATE ───
let cartItems = [];
let currentUser = null;
let isDark = false;

// ─── DOM REFS ───
const cartContent = document.getElementById('cartContent');
const grandTotalContainer = document.getElementById('grandTotalContainer');
const grandTotal = document.getElementById('grandTotal');
const cartBadge = document.getElementById('cartBadge');
const notifBadge = document.getElementById('notifBadge');
const profileAvatar = document.getElementById('profileAvatar');
const itemCount = document.getElementById('itemCount');
const themeToggle = document.getElementById('themeToggle');

// ─── THEME ───
function toggleTheme() {
    isDark = !isDark;
    document.documentElement.classList.toggle('dark', isDark);
    themeToggle.textContent = isDark ? '☀️' : '🌓';
    localStorage.setItem('simhaTheme', isDark ? 'dark' : 'light');
}
themeToggle.addEventListener('click', toggleTheme);

if (localStorage.getItem('simhaTheme') === 'dark') {
    isDark = true;
    document.documentElement.classList.add('dark');
    themeToggle.textContent = '☀️';
}

// ─── TOAST ───
function showToast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️' };
    t.innerHTML = `<span>${icons[type]||'ℹ️'}</span> ${msg}`;
    c.appendChild(t);
    setTimeout(() => {
        t.style.transition = 'opacity 0.3s,transform 0.3s';
        t.style.opacity = '0';
        t.style.transform = 'translateY(10px)';
        setTimeout(() => t.remove(), 300);
    }, 2500);
}
window.showToast = showToast;

// ─── UPDATE CART BADGE ───
function updateCartBadge() {
    const count = cartItems.reduce((sum, item) => sum + (item.qty || 0), 0);
    if (count > 0) {
        cartBadge.textContent = count > 99 ? '99+' : count;
        cartBadge.classList.add('show');
        itemCount.textContent = `${count} items`;
    } else {
        cartBadge.classList.remove('show');
        itemCount.textContent = '0 items';
    }
}

// ─── GROUP BY SHOP ───
function groupByShop(items) {
    const grouped = {};
    items.forEach(item => {
        const shopId = item.shopId || 'unknown';
        if (!grouped[shopId]) grouped[shopId] = [];
        grouped[shopId].push(item);
    });
    return grouped;
}

// ─── RENDER CART ───
function renderCart() {
    if (!cartItems || cartItems.length === 0) {
        cartContent.innerHTML = `
            <div class="empty-cart">
                <span class="emoji">🛒</span>
                <h2>Your cart is empty</h2>
                <p>Browse shops and add products you love.</p>
                <a href="shop-listing.html" class="btn-primary">Browse Shops →</a>
            </div>
        `;
        grandTotalContainer.style.display = 'none';
        updateCartBadge();
        return;
    }

    const grouped = groupByShop(cartItems);
    let html = '';
    let grandTotalAmount = 0;

    for (const [shopId, items] of Object.entries(grouped)) {
        const shopTotal = items.reduce((sum, item) => sum + (item.price || 0) * (item.qty || 0), 0);
        grandTotalAmount += shopTotal;
        const shopName = items[0]?.shopName || 'Shop';
        const whatsapp = items[0]?.whatsappNumber || '';

        html += `
            <div class="cart-section" data-shop="${shopId}">
                <div class="section-header">
                    <span class="shop-name">🏪 ${shopName}</span>
                    ${whatsapp ? `<span class="shop-whatsapp">📱 ${whatsapp}</span>` : ''}
                </div>
                ${items.map(item => `
                    <div class="cart-item" data-product="${item.productId}">
                        <div class="item-image">
                            <img src="${item.imageURL || 'https://picsum.photos/seed/' + (item.productId || 'cart') + '/60/60'}" 
                                 alt="${item.productName}" loading="lazy"
                                 onerror="this.src='https://picsum.photos/60/60'">
                        </div>
                        <div class="item-info">
                            <div class="name">${item.productName || 'Product'}</div>
                            <div class="unit">${item.unit || ''}</div>
                            <div class="price">Rs. ${(item.price || 0).toLocaleString()}</div>
                        </div>
                        <div class="item-actions">
                            <button class="qty-btn" onclick="updateQuantity('${item.productId}', ${(item.qty || 0) - 1})" 
                                    ${(item.qty || 0) <= 1 ? 'disabled' : ''}>−</button>
                            <span class="qty">${item.qty || 0}</span>
                            <button class="qty-btn" onclick="updateQuantity('${item.productId}', ${(item.qty || 0) + 1})">+</button>
                            <button class="remove-btn" onclick="removeFromCart('${item.productId}')">✕</button>
                        </div>
                        <div class="subtotal">Rs. ${((item.price || 0) * (item.qty || 0)).toLocaleString()}</div>
                    </div>
                `).join('')}
                <div class="section-footer">
                    <span class="total">Shop Total: <span>Rs. ${shopTotal.toLocaleString()}</span></span>
                    <button class="btn-primary" onclick="checkout('${shopId}')">
                        Order from ${shopName} →
                    </button>
                </div>
            </div>
        `;
    }

    cartContent.innerHTML = html;

    grandTotalContainer.style.display = 'block';
    grandTotal.textContent = `Rs. ${grandTotalAmount.toLocaleString()}`;
    updateCartBadge();
}

// ─── LOAD CART ───
function loadCart() {
    const user = auth.currentUser;
    if (!user) {
        cartContent.innerHTML = `
            <div class="empty-cart">
                <span class="emoji">🔒</span>
                <h2>Please Login</h2>
                <p>Login to view and manage your cart.</p>
                <a href="auth.html" class="btn-primary">Login →</a>
            </div>
        `;
        grandTotalContainer.style.display = 'none';
        return;
    }

    const cartRef = doc(db, 'cart', user.uid);
    
    onSnapshot(cartRef, (docSnap) => {
        if (docSnap.exists()) {
            cartItems = docSnap.data().items || [];
        } else {
            cartItems = [];
        }
        renderCart();
    }, (error) => {
        console.error('Cart listener error:', error);
        showToast('Failed to load cart', 'error');
    });
}

// ─── UPDATE QUANTITY ───
window.updateQuantity = async function(productId, newQty) {
    const user = auth.currentUser;
    if (!user) { showToast('Please login', 'error'); return; }
    if (newQty < 0) return;

    try {
        const cartRef = doc(db, 'cart', user.uid);
        const cartDoc = await getDoc(cartRef);
        if (cartDoc.exists()) {
            let items = cartDoc.data().items || [];
            const index = items.findIndex(item => item.productId === productId);
            if (index >= 0) {
                if (newQty === 0) {
                    items.splice(index, 1);
                } else {
                    items[index].qty = newQty;
                }
                await updateDoc(cartRef, { items, updatedAt: serverTimestamp() });
            }
        }
    } catch (error) {
        console.error('Error updating quantity:', error);
        showToast('Failed to update quantity', 'error');
    }
};

// ─── REMOVE FROM CART ───
window.removeFromCart = async function(productId) {
    const user = auth.currentUser;
    if (!user) return;
    try {
        const cartRef = doc(db, 'cart', user.uid);
        const cartDoc = await getDoc(cartRef);
        if (cartDoc.exists()) {
            let items = cartDoc.data().items || [];
            items = items.filter(item => item.productId !== productId);
            await updateDoc(cartRef, { items, updatedAt: serverTimestamp() });
            showToast('Item removed from cart', 'info');
        }
    } catch (error) {
        console.error('Error removing item:', error);
        showToast('Failed to remove item', 'error');
    }
};

// ─── CHECKOUT ───
window.checkout = function(shopId) {
    const user = auth.currentUser;
    if (!user) {
        showToast('Please login to checkout', 'error');
        window.location.href = 'auth.html';
        return;
    }
    sessionStorage.setItem('checkoutShopId', shopId);
    window.location.href = `checkout.html?shopId=${shopId}`;
};

// ─── UPDATE NOTIF BADGE ───
async function updateNotifBadge() {
    const user = auth.currentUser;
    if (!user) { notifBadge.classList.remove('show'); return; }
    try {
        const ud = await getDoc(doc(db, 'users', user.uid));
        if (!ud.exists()) return;
        const read = ud.data().readNotifications || [];
        const ns = await getDocs(query(collection(db, 'notifications'), where('isActive','==',true)));
        const unread = ns.size - read.length;
        notifBadge.textContent = unread > 99 ? '99+' : unread;
        notifBadge.classList.toggle('show', unread > 0);
    } catch {}
}

// ─── PROFILE AVATAR ───
function updateProfile(user) {
    if (user) {
        const name = user.displayName || user.email || 'User';
        const initial = name.charAt(0).toUpperCase();
        if (user.photoURL) {
            profileAvatar.innerHTML = `<img src="${user.photoURL}" alt="${name}">`;
        } else {
            profileAvatar.textContent = initial;
        }
    } else {
        profileAvatar.textContent = '👤';
    }
}

// ─── AUTH ───
onAuthStateChanged(auth, user => {
    currentUser = user;
    updateProfile(user);
    updateNotifBadge();
    if (user) {
        loadCart();
    } else {
        cartContent.innerHTML = `
            <div class="empty-cart">
                <span class="emoji">🔒</span>
                <h2>Please Login</h2>
                <p>Login to view and manage your cart.</p>
                <a href="auth.html" class="btn-primary">Login →</a>
            </div>
        `;
        grandTotalContainer.style.display = 'none';
        cartBadge.classList.remove('show');
        itemCount.textContent = '0 items';
    }
});

console.log('🚀 Cart Page — Premium Design with Desktop Nav');
