<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Categories · Simha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ─── ROOT ─── */
        :root {
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --gold-gradient: linear-gradient(135deg, #c9a84c 0%, #f5e6b8 40%, #c9a84c 70%, #a8892e 100%);
            --bg: #f4f7fb;
            --surface: #ffffff;
            --card: #ffffff;
            --border: #e8ecf0;
            --text: #0d0d0d;
            --text-2: #6b727a;
            --text-3: #a0a7ae;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.08);
            --radius: 16px;
            --transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .dark {
            --bg: #0a0a0a;
            --surface: #141414;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #f5f0eb;
            --text-2: #a8a09a;
            --text-3: #6b6a6a;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
        }
        .app { max-width: 1200px; margin: 0 auto; padding: 0 16px 80px; }

        /* ─── TOP NAV ─── */
        .top-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow);
            border-radius: 0 0 var(--radius) var(--radius);
            margin-bottom: 8px;
        }
        .top-nav .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Playfair Display', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .top-nav .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
            align-items: center;
        }
        .top-nav .nav-links a {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-2);
            transition: all var(--transition);
            padding: 6px 12px;
            border-radius: 50px;
            text-decoration: none;
        }
        .top-nav .nav-links a:hover {
            color: var(--text);
            background: rgba(201,168,76,0.06);
        }
        .top-nav .nav-links a.active {
            color: var(--gold);
            background: rgba(201,168,76,0.08);
        }
        .top-nav .nav-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .top-nav .nav-actions button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-2);
            transition: all var(--transition);
            position: relative;
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
        .top-nav .nav-actions button:hover {
            background: rgba(201,168,76,0.06);
            color: var(--text);
        }
        .top-nav .nav-actions button .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--gold-gradient);
            color: #0a0a0a;
            font-size: 8px;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--surface);
        }
        .top-nav .nav-actions button .badge.show { display: flex; }
        .top-nav .nav-actions .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-2);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .top-nav .nav-actions .theme-toggle:hover {
            background: rgba(201,168,76,0.06);
            color: var(--text);
        }
        .top-nav .nav-actions .profile-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold-gradient);
            color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
            border: 2px solid transparent;
            overflow: hidden;
            text-decoration: none;
        }
        .top-nav .nav-actions .profile-btn:hover {
            transform: scale(1.05);
            border-color: var(--gold);
        }
        .top-nav .nav-actions .profile-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .top-nav .nav-actions .admin-btn {
            padding: 6px 16px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            border-radius: 50px;
            font-weight: 700;
            font-size: 11px;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            text-decoration: none;
        }
        .top-nav .nav-actions .admin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(201,168,76,0.2);
        }

        @media (max-width: 768px) {
            .top-nav .nav-links a { font-size: 11px; padding: 4px 8px; }
            .top-nav .nav-links { gap: 4px; }
            .top-nav .logo { font-size: 16px; }
            .top-nav .nav-actions .admin-btn { font-size: 9px; padding: 4px 12px; }
        }
        @media (max-width: 480px) {
            .top-nav { padding: 0 10px; height: 54px; flex-wrap: wrap; gap: 4px; }
            .top-nav .nav-links { order: 3; width: 100%; justify-content: center; gap: 2px; }
            .top-nav .nav-links a { font-size: 10px; padding: 3px 6px; }
            .top-nav .nav-actions { gap: 2px; }
            .top-nav .nav-actions button { width: 32px; height: 32px; font-size: 15px; }
            .top-nav .nav-actions .profile-btn { width: 30px; height: 30px; font-size: 12px; }
        }

        /* ─── PAGE HEADER ─── */
        .page-header {
            margin: 12px 0 8px;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            position: relative;
        }
        .page-header h1::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 40px;
            height: 2px;
            background: var(--gold-gradient);
            border-radius: 2px;
        }
        .page-header p {
            color: var(--text-2);
            font-size: 14px;
            margin-top: 6px;
        }
        .page-header p strong { color: var(--gold); }

        /* ─── SEARCH BAR ─── */
        .search-wrapper {
            position: relative;
            margin: 12px 0 16px;
        }
        .search-bar {
            background: var(--surface);
            border-radius: 50px;
            padding: 4px 6px 4px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            transition: all var(--transition);
            box-shadow: var(--shadow);
        }
        .search-bar:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.08), var(--shadow);
        }
        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 40px;
        }
        .search-bar input::placeholder { color: var(--text-3); }
        .search-bar .icon { color: var(--text-3); font-size: 15px; }
        .search-bar .clear-btn {
            color: var(--text-3);
            font-size: 16px;
            cursor: pointer;
            display: none;
            padding: 4px;
            background: none;
            border: none;
        }
        .search-bar .clear-btn.show { display: block; }

        /* ─── RECENTLY VIEWED ─── */
        .recent-section {
            margin-bottom: 16px;
            display: none;
        }
        .recent-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 8px;
            font-family: 'Playfair Display', serif;
        }
        .recent-pills {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .recent-pill {
            padding: 5px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
            background: var(--surface);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all var(--transition);
        }
        .recent-pill:hover {
            border-color: var(--gold);
            color: var(--text);
            transform: translateY(-2px);
        }

        /* ─── CATEGORY GRID ─── */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin: 8px 0 20px;
        }
        .category-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 24px 16px;
            text-align: center;
            transition: all var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .category-card:hover {
            transform: translateY(-6px);
            border-color: var(--gold);
            box-shadow: var(--shadow-md);
        }
        .category-card .color-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }
        .category-card .emoji {
            font-size: 36px;
            display: block;
            margin-bottom: 8px;
        }
        .category-card .name {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }
        .category-card .count {
            font-size: 12px;
            color: var(--text-2);
            margin-top: 2px;
        }
        .category-card .count strong { color: var(--gold); }

        /* ─── FEATURED BANNER ─── */
        .featured-banner {
            background: var(--gold-gradient);
            color: #0a0a0a;
            border-radius: var(--radius);
            padding: 20px 24px;
            margin: 16px 0 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 4px 20px rgba(201,168,76,0.15);
        }
        .featured-banner:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 40px rgba(201,168,76,0.25);
        }
        .featured-banner .content .emoji {
            font-size: 28px;
            display: block;
        }
        .featured-banner .content .title {
            font-size: 18px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }
        .featured-banner .content .sub {
            font-size: 13px;
            opacity: 0.8;
        }
        .featured-banner .arrow {
            font-size: 28px;
            opacity: 0.6;
            transition: all var(--transition);
        }
        .featured-banner:hover .arrow {
            transform: translateX(4px);
            opacity: 1;
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: var(--text-2);
        }
        .empty-state .emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }
        .empty-state h3 {
            font-size: 18px;
            color: var(--text);
            font-family: 'Playfair Display', serif;
        }
        .empty-state p {
            font-size: 14px;
        }

        /* ─── SKELETON ─── */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
            border-radius: 10px;
            height: 120px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ─── TOAST ─── */
        #toastContainer {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            pointer-events: none;
        }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            font-size: 13px;
            font-weight: 500;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
            animation: slideUp 0.3s ease;
        }
        .toast.error { border-color: #dc2626; }
        .toast.warning { border-color: #f59e0b; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── BOTTOM NAV ─── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 58px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 4px 0 8px;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .bn-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-size: 9px;
            font-weight: 500;
            color: var(--text-2);
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            min-width: 44px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all var(--transition);
            position: relative;
        }
        .bn-item .bn-icon { font-size: 20px; }
        .bn-item.active { color: var(--gold); }
        .bn-item:hover { color: var(--text); }
        .bn-item .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            font-size: 8px;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        .bn-item .badge.show { display: flex; }
        @media (min-width: 768px) { .bottom-nav { display: none !important; } }

        /* ─── RESPONSIVE ─── */
        @media (min-width: 768px) {
            .category-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (min-width: 1024px) {
            .category-grid { grid-template-columns: repeat(5, 1fr); }
        }
        @media (max-width: 767px) {
            .category-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .category-card { padding: 16px 12px; }
            .category-card .emoji { font-size: 28px; }
            .featured-banner { padding: 16px 18px; }
            .featured-banner .content .title { font-size: 16px; }
            .page-header h1 { font-size: 22px; }
        }
        @media (max-width: 480px) {
            .category-grid { grid-template-columns: repeat(2, 1fr); }
            .category-card .emoji { font-size: 24px; }
            .category-card .name { font-size: 12px; }
        }
    </style>
</head>

<div class="app">

    <!-- ─── TOP NAV ─── -->
    <nav class="top-nav">
        <div class="logo">SIMHA</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>

    <!-- ─── PAGE HEADER ─── -->
    <div class="page-header">

    <!-- ─── SEARCH BAR ─── -->
    <div class="search-wrapper">
        <div class="search-bar">
            <span class="icon">🔍</span>

    <!-- ─── RECENTLY VIEWED ─── -->
    <div class="recent-section" id="recentSection">

    <!-- ─── FEATURED BANNER ─── -->
    <div class="featured-banner" id="featuredBanner">

    <!-- ─── CATEGORY GRID ─── -->
    <div class="category-grid" id="categoryGrid">
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
        <div class="skeleton"></div>
    </div>

    <!-- ─── BOTTOM NAV ─── -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="bn-item" onclick="window.location.href='index.html'">
            <span class="bn-icon">🏠</span>Home
        </button>
        <button class="bn-item" onclick="window.location.href='shop-listing.html'">
            <span class="bn-icon">🏪</span>Shops
        </button>
        <button class="bn-item active" onclick="window.location.href='categories.html'">
            <span class="bn-icon">📂</span>Categories
        </button>
        <button class="bn-item" onclick="window.location.href='orders.html'">
            <span class="bn-icon">📋</span>Orders
        </button>
        <button class="bn-item" onclick="window.location.href='profile.html'">
            <span class="bn-icon">👤</span>Profile
        </button>
    </nav>

</div>

<!-- ─── TOAST ─── -->
<div id="toastContainer"></div>

// ─── CATEGORIES DATA ───
const categories = [
    { name: 'Grocery Stores',     emoji: '🛒', color: '#2e7d32' },
    { name: 'Mobile Shops',       emoji: '📱', color: '#1565c0' },
    { name: 'Clothing Stores',    emoji: '👕', color: '#e65100' },
    { name: 'Electronics Shops',  emoji: '💻', color: '#00695c' },
    { name: 'Restaurants & Food', emoji: '🍽️', color: '#bf360c' },
    { name: 'Hardware Stores',    emoji: '🔧', color: '#4e342e' },
    { name: 'Pharmacy',           emoji: '💊', color: '#00838f' },
    { name: 'Agriculture Stores', emoji: '🌱', color: '#33691e' },
    { name: 'Beauty & Saloon',    emoji: '💄', color: '#880e4f' },
    { name: 'Other',              emoji: '📦', color: '#424242' }
];

// ─── STATE ───
let categoryCounts = {};
let isDark = false;

// ─── DOM REFS ───
const categoryGrid = document.getElementById('categoryGrid');
const searchInput = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
const categoryCount = document.getElementById('categoryCount');
const profileAvatar = document.getElementById('profileAvatar');
const recentSection = document.getElementById('recentSection');
const recentPills = document.getElementById('recentPills');
const featuredBanner = document.getElementById('featuredBanner');
const featuredEmoji = document.getElementById('featuredEmoji');
const featuredTitle = document.getElementById('featuredTitle');
const featuredSub = document.getElementById('featuredSub');
const themeToggle = document.getElementById('themeToggle');
const notifBadge = document.getElementById('notifBadge');

// ─── THEME ───
function toggleTheme() {
    isDark = !isDark;
    document.documentElement.classList.toggle('dark', isDark);
    themeToggle.textContent = isDark ? '☀️' : '🌓';
    localStorage.setItem('simhaTheme', isDark ? 'dark' : 'light');
}
themeToggle.addEventListener('click', toggleTheme);

if (localStorage.getItem('simhaTheme') === 'dark') {
    isDark = true;
    document.documentElement.classList.add('dark');
    themeToggle.textContent = '☀️';
}

// ─── TOAST ───
function showToast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️' };
    t.innerHTML = `<span>${icons[type]||'ℹ️'}</span> ${msg}`;
    c.appendChild(t);
    setTimeout(() => {
        t.style.transition = 'opacity 0.3s,transform 0.3s';
        t.style.opacity = '0';
        t.style.transform = 'translateY(10px)';
        setTimeout(() => t.remove(), 300);
    }, 2500);
}
window.showToast = showToast;

// ─── LOAD CATEGORY COUNTS ───
async function loadCategoryCounts() {
    try {
        const shopsSnap = await getDocs(collection(db, 'shops'));
        const shops = shopsSnap.docs.map(d => d.data());

        categories.forEach(cat => {
            categoryCounts[cat.name] = shops.filter(
                s => s.category === cat.name && s.isActive !== false
            ).length;
        });

        renderCategories();
        renderFeaturedBanner();
        renderRecentCategories();
    } catch (error) {
        console.error('Error loading shops:', error);
        categories.forEach(cat => { categoryCounts[cat.name] = 0; });
        renderCategories();
        showToast('Failed to load category data', 'error');
    }
}

// ─── RENDER CATEGORIES ───
function renderCategories() {
    const q = searchInput.value.toLowerCase().trim();
    let filtered = categories.filter(cat => cat.name.toLowerCase().includes(q));
    filtered.sort((a, b) => (categoryCounts[b.name] || 0) - (categoryCounts[a.name] || 0));

    if (filtered.length === 0) {
        categoryGrid.innerHTML = `
            <div class="empty-state">
                <span class="emoji">🔍</span>
                <h3>No categories found</h3>
                <p>Try a different search term</p>
            </div>`;
        return;
    }

    categoryGrid.innerHTML = filtered.map(cat => {
        const count = categoryCounts[cat.name] || 0;
        return `
            <div class="category-card" onclick="navigateToCategory('${cat.name}')">
                <div class="color-bar" style="background:${cat.color};"></div>
                <span class="emoji">${cat.emoji}</span>
                <div class="name">${cat.name}</div>
                <div class="count"><strong>${count}</strong> ${count === 1 ? 'shop' : 'shops'}</div>
            </div>`;
    }).join('');

    const totalShops = Object.values(categoryCounts).reduce((a, b) => a + b, 0);
    categoryCount.innerHTML = `Discover <strong>${totalShops}</strong> shops across <strong>${categories.length}</strong> categories`;
}

// ─── FEATURED BANNER ───
function renderFeaturedBanner() {
    const withShops = categories.filter(c => (categoryCounts[c.name] || 0) > 0);
    if (withShops.length === 0) {
        featuredBanner.style.display = 'none';
        return;
    }
    const top = withShops.reduce((a, b) =>
        (categoryCounts[a.name] || 0) >= (categoryCounts[b.name] || 0) ? a : b
    );
    featuredEmoji.textContent = top.emoji;
    featuredTitle.textContent = top.name;
    featuredSub.textContent = `${categoryCounts[top.name]} shops • Shop now!`;
    featuredBanner.style.display = 'flex';
    featuredBanner.onclick = () => navigateToCategory(top.name);
}

// ─── NAVIGATE ───
function navigateToCategory(categoryName) {
    if (!categoryName) return;
    saveRecentCategory(categoryName);
    window.location.href = `shop-listing.html?category=${encodeURIComponent(categoryName)}`;
}
window.navigateToCategory = navigateToCategory;

// ─── RECENT CATEGORIES ───
function saveRecentCategory(name) {
    let recent = JSON.parse(localStorage.getItem('recentCategories') || '[]');
    recent = recent.filter(c => c !== name);
    recent.unshift(name);
    if (recent.length > 5) recent.pop();
    localStorage.setItem('recentCategories', JSON.stringify(recent));
    renderRecentCategories();
}

function renderRecentCategories() {
    const recent = JSON.parse(localStorage.getItem('recentCategories') || '[]');
    if (recent.length === 0) { recentSection.style.display = 'none'; return; }
    recentSection.style.display = 'block';
    recentPills.innerHTML = recent.map(cat => `
        <span class="recent-pill" onclick="navigateToCategory('${cat}')">${cat}</span>
    `).join('');
}

// ─── SEARCH ───
searchInput.addEventListener('input', function() {
    const val = this.value;
    clearBtn.classList.toggle('show', val.length > 0);
    renderCategories();
});

window.clearSearch = function() {
    searchInput.value = '';
    clearBtn.classList.remove('show');
    renderCategories();
};

// ─── NOTIFICATION BADGE ───
async function updateNotifBadge() {
    const user = auth.currentUser;
    if (!user) { notifBadge.classList.remove('show'); return; }
    try {
        const ud = await getDoc(doc(db, 'users', user.uid));
        if (!ud.exists()) return;
        const read = ud.data().readNotifications || [];
        const ns = await getDocs(query(collection(db, 'notifications'), where('isActive','==',true)));
        const unread = ns.size - read.length;
        notifBadge.textContent = unread > 99 ? '99+' : unread;
        notifBadge.classList.toggle('show', unread > 0);
    } catch {}
}

// ─── PROFILE AVATAR ───
function updateProfile(user) {
    if (user) {
        const name = user.displayName || user.email || 'User';
        const initial = name.charAt(0).toUpperCase();
        if (user.photoURL) {
            profileAvatar.innerHTML = `<img src="${user.photoURL}" alt="${name}">`;
        } else {
            profileAvatar.textContent = initial;
        }
    } else {
        profileAvatar.textContent = '👤';
    }
}

// ─── AUTH ───
onAuthStateChanged(auth, (user) => {
    updateProfile(user);
    updateNotifBadge();
    // Categories are public — guests can browse
});

// ─── INIT ───
renderRecentCategories();
loadCategoryCounts();

console.log('📂 Categories — Premium Design with Real-time Counts & Recent Views');
</script>
</body>
