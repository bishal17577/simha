<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>Shops · Simha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ─── ROOT ─── */
        :root {
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --gold-gradient: linear-gradient(135deg, #c9a84c 0%, #f5e6b8 40%, #c9a84c 70%, #a8892e 100%);
            --bg: #f4f7fb;
            --surface: #ffffff;
            --card: #ffffff;
            --border: #e8ecf0;
            --text: #0d0d0d;
            --text-2: #6b727a;
            --text-3: #a0a7ae;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.08);
            --radius: 16px;
            --transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .dark {
            --bg: #0a0a0a;
            --surface: #141414;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #f5f0eb;
            --text-2: #a8a09a;
            --text-3: #6b6a6a;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --shadow-md: 0 8px 30px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background var(--transition), color var(--transition);
        }
        .app { max-width: 1200px; margin: 0 auto; padding: 0 16px 80px; }

        /* ─── TOP NAV ─── */
        .top-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: var(--shadow);
            border-radius: 0 0 var(--radius) var(--radius);
            margin-bottom: 8px;
        }
        .top-nav .logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Playfair Display', serif;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .top-nav .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
            align-items: center;
        }
        .top-nav .nav-links a {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-2);
            transition: all var(--transition);
            padding: 6px 12px;
            border-radius: 50px;
            text-decoration: none;
        }
        .top-nav .nav-links a:hover {
            color: var(--text);
            background: rgba(201,168,76,0.06);
        }
        .top-nav .nav-links a.active {
            color: var(--gold);
            background: rgba(201,168,76,0.08);
        }
        .top-nav .nav-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .top-nav .nav-actions button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-2);
            transition: all var(--transition);
            position: relative;
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }
        .top-nav .nav-actions button:hover {
            background: rgba(201,168,76,0.06);
            color: var(--text);
        }
        .top-nav .nav-actions button .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--gold-gradient);
            color: #0a0a0a;
            font-size: 8px;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--surface);
        }
        .top-nav .nav-actions button .badge.show { display: flex; }
        .top-nav .nav-actions .theme-toggle {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: transparent;
            border: none;
            color: var(--text-2);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .top-nav .nav-actions .theme-toggle:hover {
            background: rgba(201,168,76,0.06);
            color: var(--text);
        }
        .top-nav .nav-actions .profile-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gold-gradient);
            color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
            border: 2px solid transparent;
            overflow: hidden;
            text-decoration: none;
        }
        .top-nav .nav-actions .profile-btn:hover {
            transform: scale(1.05);
            border-color: var(--gold);
        }
        .top-nav .nav-actions .profile-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .top-nav .nav-actions .admin-btn {
            padding: 6px 16px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            border-radius: 50px;
            font-weight: 700;
            font-size: 11px;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            text-decoration: none;
        }
        .top-nav .nav-actions .admin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(201,168,76,0.2);
        }

        @media (max-width: 768px) {
            .top-nav .nav-links a { font-size: 11px; padding: 4px 8px; }
            .top-nav .nav-links { gap: 4px; }
            .top-nav .logo { font-size: 16px; }
            .top-nav .nav-actions .admin-btn { font-size: 9px; padding: 4px 12px; }
        }
        @media (max-width: 480px) {
            .top-nav { padding: 0 10px; height: 54px; flex-wrap: wrap; gap: 4px; }
            .top-nav .nav-links { order: 3; width: 100%; justify-content: center; gap: 2px; }
            .top-nav .nav-links a { font-size: 10px; padding: 3px 6px; }
            .top-nav .nav-actions { gap: 2px; }
            .top-nav .nav-actions button { width: 32px; height: 32px; font-size: 15px; }
            .top-nav .nav-actions .profile-btn { width: 30px; height: 30px; font-size: 12px; }
        }

        /* ─── PAGE HEADER ─── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 12px 0 8px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            position: relative;
        }
        .page-header h1::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 40px;
            height: 2px;
            background: var(--gold-gradient);
            border-radius: 2px;
        }
        .page-header .results-count {
            font-size: 14px;
            color: var(--text-2);
            background: var(--surface);
            padding: 4px 16px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }
        .page-header .results-count strong { color: var(--gold); }

        /* ─── SEARCH BAR ─── */
        .search-wrapper {
            position: relative;
            margin: 8px 0 12px;
        }
        .search-bar {
            background: var(--surface);
            border-radius: 50px;
            padding: 4px 6px 4px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border);
            transition: all var(--transition);
            box-shadow: var(--shadow);
        }
        .search-bar:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.08), var(--shadow);
        }
        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 40px;
        }
        .search-bar input::placeholder { color: var(--text-3); }
        .search-bar .icon { color: var(--text-3); font-size: 15px; }
        .search-bar .clear-btn {
            color: var(--text-3);
            font-size: 16px;
            cursor: pointer;
            display: none;
            padding: 4px;
            background: none;
            border: none;
        }
        .search-bar .clear-btn.show { display: block; }
        .search-bar .voice-btn {
            color: var(--text-3);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 50%;
            transition: all var(--transition);
            background: none;
            border: none;
            min-width: 38px;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-bar .voice-btn:hover { background: rgba(0,0,0,0.04); }
        .search-bar .voice-btn.recording { color: var(--gold); animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ─── SEARCH SUGGESTIONS ─── */
        .search-suggestions {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            z-index: 50;
            max-height: 280px;
            overflow-y: auto;
            padding: 6px 0;
        }
        .search-suggestions.show { display: block; }
        .sugg-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text);
        }
        .sugg-item:hover { background: rgba(201,168,76,0.04); }
        .sugg-item .sugg-icon { font-size: 16px; opacity: 0.6; }
        .sugg-item mark { background: rgba(201,168,76,0.15); padding: 0 4px; border-radius: 4px; color: var(--text); }
        .sugg-item .sugg-type {
            font-size: 9px;
            color: var(--text-3);
            margin-left: auto;
            background: rgba(0,0,0,0.04);
            padding: 2px 10px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* ─── RECENT SEARCHES ─── */
        .recent-searches {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 4px 0 12px;
        }
        .recent-chip {
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-2);
            background: var(--surface);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all var(--transition);
        }
        .recent-chip:hover {
            border-color: var(--gold);
            color: var(--text);
        }

        /* ─── FILTER BAR ─── */
        .filter-bar {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0 12px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .filter-bar::-webkit-scrollbar { display: none; }
        .filter-chip {
            flex-shrink: 0;
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            box-shadow: var(--shadow);
        }
        .filter-chip:hover {
            border-color: var(--gold);
            color: var(--text);
            transform: translateY(-2px);
        }
        .filter-chip.active {
            background: var(--gold-gradient);
            color: #0a0a0a;
            border-color: var(--gold);
            box-shadow: 0 4px 20px rgba(201,168,76,0.15);
            font-weight: 600;
        }
        .filter-chip .count {
            font-size: 10px;
            opacity: 0.7;
            margin-left: 4px;
        }

        /* ─── SHOP GRID ─── */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 8px 0 16px;
        }
        .shop-card {
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: var(--shadow);
        }
        .shop-card:hover {
            transform: translateY(-6px);
            border-color: var(--gold);
            box-shadow: var(--shadow-md);
        }
        .shop-card .shop-img {
            height: 140px;
            background: var(--border);
            position: relative;
            overflow: hidden;
        }
        .shop-card .shop-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition);
        }
        .shop-card:hover .shop-img img { transform: scale(1.04); }
        .shop-card .shop-img .status-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
            backdrop-filter: blur(8px);
        }
        .shop-card .shop-img .status-badge.open {
            background: rgba(10,107,94,0.85);
            color: #fff;
        }
        .shop-card .shop-img .status-badge.closed {
            background: rgba(208,0,0,0.85);
            color: #fff;
        }
        .shop-card .shop-img .verified-badge {
            position: absolute;
            bottom: 8px;
            left: 8px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 600;
        }
        .shop-card .shop-img .new-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            padding: 2px 10px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 700;
        }
        .shop-card .shop-info {
            padding: 12px 14px 14px;
        }
        .shop-card .shop-info .name {
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .shop-card .shop-info .category {
            font-size: 12px;
            color: var(--text-2);
        }
        .shop-card .shop-info .address {
            font-size: 12px;
            color: var(--text-2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .shop-card .shop-info .rating-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }
        .shop-card .shop-info .rating-row .stars {
            font-size: 14px;
            font-weight: 600;
            color: var(--gold);
        }
        .shop-card .shop-info .rating-row .count {
            font-size: 12px;
            color: var(--text-2);
        }
        .shop-card .shop-info .view-btn {
            margin-top: 8px;
            padding: 6px 18px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .shop-card .shop-info .view-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 20px rgba(201,168,76,0.2);
        }
        .shop-card .shop-info .match-highlight {
            background: rgba(201,168,76,0.15);
            padding: 0 2px;
            border-radius: 2px;
        }

        /* ─── LOAD MORE ─── */
        .load-more-container {
            text-align: center;
            padding: 16px 0 24px;
        }
        .load-more-btn {
            padding: 12px 40px;
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
            box-shadow: var(--shadow);
        }
        .load-more-btn:hover:not(:disabled) {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .load-more-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* ─── SKELETON ─── */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.6s infinite;
            border-radius: 10px;
        }
        .skeleton-card {
            height: 280px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ─── EMPTY STATE ─── */
        .empty-state {
            grid-column: 1 / -1;
            padding: 60px 20px;
            text-align: center;
            color: var(--text-2);
        }
        .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
        .empty-state h3 { color: var(--text); font-size: 18px; }
        .empty-state p { font-size: 14px; }
        .empty-state .suggestions {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .empty-state .suggestion-chip {
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .empty-state .suggestion-chip:hover {
            border-color: var(--gold);
        }
        .empty-state .btn-secondary {
            margin-top: 16px;
            padding: 10px 28px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all var(--transition);
        }
        .empty-state .btn-secondary:hover {
            transform: scale(1.04);
            box-shadow: 0 4px 20px rgba(201,168,76,0.2);
        }

        /* ─── TOAST ─── */
        #toastContainer {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 90%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            pointer-events: none;
        }
        .toast {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            font-size: 13px;
            font-weight: 500;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
            animation: slideUp 0.3s ease;
        }
        .toast.error { border-color: #dc2626; }
        .toast.warning { border-color: #f59e0b; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── BOTTOM NAV ─── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 58px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 4px 0 8px;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .bn-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-size: 9px;
            font-weight: 500;
            color: var(--text-2);
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            min-width: 44px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all var(--transition);
            position: relative;
        }
        .bn-item .bn-icon { font-size: 20px; }
        .bn-item.active { color: var(--gold); }
        .bn-item:hover { color: var(--text); }
        .bn-item .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: var(--gold-gradient);
            color: #0a0a0a;
            font-size: 8px;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        .bn-item .badge.show { display: flex; }
        @media (min-width: 768px) { .bottom-nav { display: none !important; } }

        /* ─── RESPONSIVE ─── */
        @media (min-width: 768px) {
            .shop-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; }
            .shop-card .shop-img { height: 170px; }
        }
        @media (min-width: 1024px) {
            .shop-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .shop-card .shop-img { height: 190px; }
        }
        @media (max-width: 480px) {
            .shop-grid { gap: 10px; }
            .shop-card .shop-img { height: 110px; }
            .page-header h1 { font-size: 22px; }
            .filter-chip { font-size: 11px; padding: 4px 12px; }
        }
    </style>
</head>
<body>

<div class="app">

    <nav class="top-nav">

        <ul class="nav-links">

                <span class="badge" id="notifBadge">0</span>

    <div class="page-header">

    <!-- ─── SEARCH BAR ─── -->
    <div class="search-wrapper">
        <div class="search-bar" role="search">
            <span class="icon">🔍</span>

            <button class="clear-btn" id="clearBtn" onclick="clearSearch()" aria-label="Clear search">✕</button>
            <button class="voice-btn" id="voiceBtn" onclick="toggleVoiceSearch()" aria-label="Voice search">🎤</button>

    <!-- ─── RECENT SEARCHES ─── -->
    <div class="recent-searches" id="recentSearches"></div>

    <!-- ─── FILTER BAR ─── -->
    <div class="filter-bar" id="filterBar">
        <button class="filter-chip active" data-filter="all" onclick="applyFilter('all')">All <span class="count" id="countAll">0</span></button>
        <button class="filter-chip" data-filter="Grocery Stores" onclick="applyFilter('Grocery Stores')">🛒 Grocery <span class="count" id="countGrocery">0</span></button>
        <button class="filter-chip" data-filter="Mobile Shops" onclick="applyFilter('Mobile Shops')">📱 Mobile <span class="count" id="countMobile">0</span></button>
        <button class="filter-chip" data-filter="Clothing Stores" onclick="applyFilter('Clothing Stores')">👕 Clothing <span class="count" id="countClothing">0</span></button>
        <button class="filter-chip" data-filter="Electronics Shops" onclick="applyFilter('Electronics Shops')">💻 Electronics <span class="count" id="countElectronics">0</span></button>
        <button class="filter-chip" data-filter="Restaurants & Food" onclick="applyFilter('Restaurants & Food')">🍽️ Food <span class="count" id="countFood">0</span></button>
        <button class="filter-chip" data-filter="Hardware Stores" onclick="applyFilter('Hardware Stores')">🔧 Hardware <span class="count" id="countHardware">0</span></button>
        <button class="filter-chip" data-filter="Pharmacy" onclick="applyFilter('Pharmacy')">💊 Pharmacy <span class="count" id="countPharmacy">0</span></button>
        <button class="filter-chip" data-filter="Agriculture Stores" onclick="applyFilter('Agriculture Stores')">🌱 Agriculture <span class="count" id="countAgriculture">0</span></button>
        <button class="filter-chip" data-filter="Beauty & Saloon" onclick="applyFilter('Beauty & Saloon')">💄 Beauty <span class="count" id="countBeauty">0</span></button>
    </div>

    <!-- ─── SHOP GRID ─── -->
    <div class="shop-grid" id="shopGrid">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
    </div>

    <!-- ─── LOAD MORE ─── -->
    <div class="load-more-container">
        <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">Load More</button>
    </div>

    <!-- ─── BOTTOM NAV ─── -->
    <nav class="bottom-nav" id="bottomNav">
        <button class="bn-item" onclick="window.location.href='index.html'">
            <span class="bn-icon">🏠</span>Home
        </button>
        <button class="bn-item active" onclick="window.location.href='shop-listing.html'">
            <span class="bn-icon">🏪</span>Shops
        </button>
        <button class="bn-item" onclick="window.location.href='cart.html'">
            <span class="bn-icon">🛒</span>Cart
            <span class="badge" id="cartBadge">0</span>
        </button>
        <button class="bn-item" onclick="window.location.href='orders.html'">
            <span class="bn-icon">📋</span>Orders
        </button>
        <button class="bn-item" onclick="window.location.href='profile.html'">
            <span class="bn-icon">👤</span>Profile
        </button>
    </nav>

</div>

<!-- ─── TOAST ─── -->
<div id="toastContainer"></div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
    }
}
</script>

<script type="module">
import { initializeApp } from 'firebase/app';
import { getAuth, onAuthStateChanged } from 'firebase/auth';
import { getFirestore, collection, doc, getDocs, getDoc, query, where, limit, startAfter } from 'firebase/firestore';

const firebaseConfig = {
    apiKey: "AIzaSyDJLnUB8XnXWPEtSRAMuQr9ASmD16HLIJc",
    authDomain: "bishalshrestha17-de676.firebaseapp.com",
    projectId: "bishalshrestha17-de676",
    storageBucket: "bishalshrestha17-de676.firebasestorage.app",
    messagingSenderId: "631628771230",
    appId: "1:631628771230:web:389c6430535f6a46b6708f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ─── STATE ───
let allShops = [];
let filteredShops = [];
let currentFilter = 'all';
let searchQuery = '';
let lastDoc = null;
let isLoading = false;
let hasMore = true;
const PAGE_SIZE = 12;
let isListening = false;
let recognition = null;
let isDark = false;

// ─── DOM REFS ───
const shopGrid = document.getElementById('shopGrid');
const searchInput = document.getElementById('searchInput');
const searchSuggestions = document.getElementById('searchSuggestions');
const clearBtn = document.getElementById('clearBtn');
const voiceBtn = document.getElementById('voiceBtn');
const loadMoreBtn = document.getElementById('loadMoreBtn');
const cartBadge = document.getElementById('cartBadge');
const notifBadge = document.getElementById('notifBadge');
const profileAvatar = document.getElementById('profileAvatar');
const resultCount = document.getElementById('resultCount');
const resultsCount = document.getElementById('resultsCount');
const recentSearches = document.getElementById('recentSearches');
const themeToggle = document.getElementById('themeToggle');

// ─── THEME ───
function toggleTheme() {
    isDark = !isDark;
    document.documentElement.classList.toggle('dark', isDark);
    themeToggle.textContent = isDark ? '☀️' : '🌓';
    localStorage.setItem('simhaTheme', isDark ? 'dark' : 'light');
}
themeToggle.addEventListener('click', toggleTheme);

if (localStorage.getItem('simhaTheme') === 'dark') {
    isDark = true;
    document.documentElement.classList.add('dark');
    themeToggle.textContent = '☀️';
}

// ─── TOAST ───
function showToast(msg, type = 'success') {
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️' };
    t.innerHTML = `<span>${icons[type]||'ℹ️'}</span> ${msg}`;
    c.appendChild(t);
    setTimeout(() => {
        t.style.transition = 'opacity 0.3s,transform 0.3s';
        t.style.opacity = '0';
        t.style.transform = 'translateY(10px)';
        setTimeout(() => t.remove(), 300);
    }, 2500);
}
window.showToast = showToast;

// ─── RECENT SEARCHES ───
function getRecentSearches() {
    try { return JSON.parse(localStorage.getItem('shopRecentSearches') || '[]'); } 
    catch { return []; }
}

function saveRecentSearch(query) {
    if (!query.trim()) return;
    let recent = getRecentSearches();
    recent = recent.filter(q => q.toLowerCase() !== query.toLowerCase());
    recent.unshift(query);
    if (recent.length > 5) recent.pop();
    localStorage.setItem('shopRecentSearches', JSON.stringify(recent));
    renderRecentSearches();
}

function renderRecentSearches() {
    const recent = getRecentSearches();
    if (recent.length === 0 || searchQuery) {
        recentSearches.innerHTML = '';
        return;
    }
    recentSearches.innerHTML = recent.map(q => `
        <span class="recent-chip" onclick="searchInput.value='${q}'; doSearch();">🔍 ${q}</span>
    `).join('');
}

// ─── VOICE SEARCH ───
window.toggleVoiceSearch = function() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        showToast('Voice search not supported', 'warning');
        return;
    }
    if (isListening) {
        if (recognition) recognition.stop();
        isListening = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
        return;
    }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        isListening = true;
        voiceBtn.classList.add('recording');
        voiceBtn.textContent = '⏹️';
        showToast('🎤 Listening...', 'info');
    };
    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        searchInput.value = transcript;
        searchQuery = transcript;
        clearBtn.classList.add('show');
        doSearch();
        saveRecentSearch(transcript);
        isListening = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
    };
    recognition.onerror = (event) => {
        if (event.error !== 'aborted') showToast('Voice error', 'error');
        isListening = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
    };
    recognition.onend = () => {
        isListening = false;
        voiceBtn.classList.remove('recording');
        voiceBtn.textContent = '🎤';
    };
    recognition.start();
};

// ─── SEARCH SUGGESTIONS ───
function showSuggestions(query) {
    if (!query.trim() || !allShops.length) {
        searchSuggestions.classList.remove('show');
        return;
    }
    const q = query.toLowerCase();
    const matches = allShops.filter(s => 
        s.shopName?.toLowerCase().includes(q) ||
        s.category?.toLowerCase().includes(q) ||
        s.district?.toLowerCase().includes(q)
    ).slice(0, 5);

    if (matches.length === 0) {
        searchSuggestions.classList.remove('show');
        return;
    }

    searchSuggestions.innerHTML = matches.map(s => `
        <div class="sugg-item" onclick="searchInput.value='${s.shopName}'; doSearch();">
            <span class="sugg-icon">🏪</span>
            <span>${highlightText(s.shopName, q)}</span>
            <span class="sugg-type">${s.category || 'Shop'}</span>
        </div>
    `).join('');
    searchSuggestions.classList.add('show');
}

function highlightText(text, query) {
    if (!text || !query) return text || '';
    const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(regex, '<mark>$1</mark>');
}

searchInput.addEventListener('input', function() {
    const val = this.value;
    clearBtn.classList.toggle('show', val.length > 0);
    if (val.length > 1) {
        showSuggestions(val);
    } else {
        searchSuggestions.classList.remove('show');
    }
    if (val.length === 0) {
        searchQuery = '';
        loadShops();
    }
});
searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { searchSuggestions.classList.remove('show'); doSearch(); }
});
searchInput.addEventListener('blur', () => {
    setTimeout(() => searchSuggestions.classList.remove('show'), 200);
});

// ─── SEARCH / FILTER ───
window.doSearch = function() {
    const q = searchInput.value.trim();
    if (q) {
        searchQuery = q;
        saveRecentSearch(q);
        searchSuggestions.classList.remove('show');
        lastDoc = null;
        hasMore = true;
        allShops = [];
        loadShops();
    } else {
        searchQuery = '';
        loadShops();
    }
};

window.clearSearch = function() {
    searchInput.value = '';
    searchQuery = '';
    clearBtn.classList.remove('show');
    searchSuggestions.classList.remove('show');
    loadShops();
    renderRecentSearches();
};

window.applyFilter = function(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.classList.toggle('active', chip.dataset.filter === filter);
    });
    lastDoc = null;
    hasMore = true;
    allShops = [];
    loadShops();
};

// ─── LOAD SHOPS ───
async function loadShops() {
    try {
        isLoading = true;
        loadMoreBtn.disabled = true;
        loadMoreBtn.textContent = 'Loading...';

        let q;
        const isFiltered = currentFilter !== 'all' && currentFilter !== 'null';
        
        if (isFiltered) {
            q = query(
                collection(db, 'shops'),
                where('isActive', '==', true),
                where('category', '==', currentFilter),
                limit(PAGE_SIZE)
            );
        } else {
            q = query(
                collection(db, 'shops'),
                where('isActive', '==', true),
                limit(PAGE_SIZE)
            );
        }

        const snapshot = await getDocs(q);
        const shops = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        lastDoc = snapshot.docs[snapshot.docs.length - 1] || null;
        hasMore = snapshot.docs.length === PAGE_SIZE;

        allShops = shops;
        filteredShops = applySearch(shops);
        renderShops(filteredShops);
        updateCounts();
        updateResults();

        isLoading = false;
        loadMoreBtn.disabled = !hasMore;
        loadMoreBtn.textContent = hasMore ? 'Load More' : 'No More Shops';

    } catch (error) {
        console.error('Error loading shops:', error);
        isLoading = false;
        loadMoreBtn.disabled = true;
        loadMoreBtn.textContent = 'Failed to load';
        showToast('Failed to load shops', 'error');
        shopGrid.innerHTML = `
            <div class="empty-state">
                <span class="emoji">⚠️</span>
                <h3>Failed to load shops</h3>
                <p>${error.message || 'Check your connection'}</p>
                <button class="btn-secondary" onclick="location.reload()">🔄 Retry</button>
            </div>
        `;
    }
}

window.loadMore = async function() {
    if (isLoading || !hasMore || !lastDoc) return;
    try {
        isLoading = true;
        loadMoreBtn.disabled = true;
        loadMoreBtn.textContent = 'Loading...';

        const isFiltered = currentFilter !== 'all' && currentFilter !== 'null';
        let q;
        if (isFiltered) {
            q = query(
                collection(db, 'shops'),
                where('isActive', '==', true),
                where('category', '==', currentFilter),
                startAfter(lastDoc),
                limit(PAGE_SIZE)
            );
        } else {
            q = query(
                collection(db, 'shops'),
                where('isActive', '==', true),
                startAfter(lastDoc),
                limit(PAGE_SIZE)
            );
        }

        const snapshot = await getDocs(q);
        const newShops = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
        lastDoc = snapshot.docs[snapshot.docs.length - 1] || null;
        hasMore = snapshot.docs.length === PAGE_SIZE;

        allShops = [...allShops, ...newShops];
        filteredShops = applySearch(allShops);
        renderShops(filteredShops);
        updateCounts();
        updateResults();

        isLoading = false;
        loadMoreBtn.disabled = !hasMore;
        loadMoreBtn.textContent = hasMore ? 'Load More' : 'No More Shops';

    } catch (error) {
        console.error('Error loading more shops:', error);
        isLoading = false;
        loadMoreBtn.disabled = false;
        loadMoreBtn.textContent = 'Load More';
        showToast('Failed to load more shops', 'error');
    }
};

function applySearch(shops) {
    if (!searchQuery.trim()) return shops;
    const q = searchQuery.toLowerCase().trim();
    return shops.filter(s => 
        s.shopName?.toLowerCase().includes(q) ||
        s.category?.toLowerCase().includes(q) ||
        s.district?.toLowerCase().includes(q) ||
        s.address?.toLowerCase().includes(q)
    );
}

// ─── RENDER SHOPS ───
function renderShops(shops) {
    if (shops.length === 0) {
        const suggestions = ['Grocery', 'Mobile', 'Electronics', 'Clothing', 'Pharmacy'];
        shopGrid.innerHTML = `
            <div class="empty-state">
                <span class="emoji">🔍</span>
                <h3>No shops found</h3>
                <p>Try adjusting your search or filter</p>
                <div class="suggestions">
                    ${suggestions.map(s => `
                        <span class="suggestion-chip" onclick="searchInput.value='${s}'; doSearch();">${s}</span>
                    `).join('')}
                </div>
                <button class="btn-secondary" onclick="currentFilter='all'; document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.filter==='all')); loadShops();">Clear Filters</button>
            </div>
        `;
        return;
    }

    const q = searchQuery.trim().toLowerCase();
    shopGrid.innerHTML = shops.map(shop => {
        const name = q ? highlightText(shop.shopName || 'Shop', q) : (shop.shopName || 'Shop');
        const category = q ? highlightText(shop.category || '', q) : (shop.category || '');
        const address = q ? highlightText(`${shop.address || ''}, ${shop.district || ''}`, q) : `${shop.address || ''}, ${shop.district || ''}`;
        const isNew = shop.createdAt && (Date.now() - new Date(shop.createdAt.seconds * 1000).getTime()) < 7 * 24 * 60 * 60 * 1000;

        return `
            <div class="shop-card" onclick="window.location.href='shop-detail.html?shopId=${shop.shopId || shop.id}'">
                <div class="shop-img">
                    <img src="${shop.shopPhotoURL || 'https://picsum.photos/seed/' + (shop.shopName || shop.id) + '/400/300'}" 
                         alt="${shop.shopName}" loading="lazy"
                         onerror="this.src='https://picsum.photos/400/300'">
                    <span class="status-badge ${shop.isOpen ? 'open' : 'closed'}">
                        ${shop.isOpen ? 'Open' : 'Closed'}
                    </span>
                    ${shop.isVerified ? '<span class="verified-badge">✅ Verified</span>' : ''}
                    ${isNew ? '<span class="new-badge">✨ New</span>' : ''}
                </div>
                <div class="shop-info">
                    <div class="name">${name}</div>
                    <div class="category">${category}</div>
                    <div class="address">📍 ${address}</div>
                    <div class="rating-row">
                        <span class="stars">⭐ ${shop.rating || 0}</span>
                        <span class="count">(${shop.reviewCount || 0} reviews)</span>
                    </div>
                    <button class="view-btn" onclick="event.stopPropagation(); window.location.href='shop-detail.html?shopId=${shop.shopId || shop.id}'">
                        View Shop →
                    </button>
                </div>
            </div>
        `;
    }).join('');
}

// ─── UPDATE COUNTS ───
function updateCounts() {
    const categories = ['all', 'Grocery Stores', 'Mobile Shops', 'Clothing Stores', 
        'Electronics Shops', 'Restaurants & Food', 'Hardware Stores', 
        'Pharmacy', 'Agriculture Stores', 'Beauty & Saloon'];
    
    categories.forEach(cat => {
        const count = cat === 'all' 
            ? allShops.length 
            : allShops.filter(s => s.category === cat).length;
        const el = document.getElementById(`count${cat.replace(/[^a-zA-Z]/g, '')}`);
        if (el) el.textContent = count;
    });
}

function updateResults() {
    const total = filteredShops.length;
    resultCount.textContent = total;
    if (searchQuery) {
        resultsCount.innerHTML = `Showing <strong>${total}</strong> shops matching "<strong>${searchQuery}</strong>"`;
    } else if (currentFilter !== 'all' && currentFilter !== 'null') {
        resultsCount.innerHTML = `Showing <strong>${total}</strong> shops in <strong>${currentFilter}</strong>`;
    } else {
        resultsCount.innerHTML = `Showing <strong>${total}</strong> shops`;
    }
}

// ─── BADGES ───
async function updateCartBadge() {
    const user = auth.currentUser;
    if (!user) { cartBadge.classList.remove('show'); return; }
    try {
        const c = await getDoc(doc(db, 'cart', user.uid));
        const count = c.exists() ? (c.data().items || []).reduce((s, i) => s + (i.qty || 0), 0) : 0;
        cartBadge.textContent = count > 99 ? '99+' : count;
        cartBadge.classList.toggle('show', count > 0);
    } catch {}
}

async function updateNotifBadge() {
    const user = auth.currentUser;
    if (!user) { notifBadge.classList.remove('show'); return; }
    try {
        const ud = await getDoc(doc(db, 'users', user.uid));
        if (!ud.exists()) return;
        const read = ud.data().readNotifications || [];
        const ns = await getDocs(query(collection(db, 'notifications'), where('isActive','==',true)));
        const unread = ns.size - read.length;
        notifBadge.textContent = unread > 99 ? '99+' : unread;
        notifBadge.classList.toggle('show', unread > 0);
    } catch {}
}

function updateProfile(user) {
    if (user) {
        const name = user.displayName || user.email || 'User';
        const initial = name.charAt(0).toUpperCase();
        if (user.photoURL) {
            profileAvatar.innerHTML = `<img src="${user.photoURL}" alt="${name}">`;
        } else {
            profileAvatar.textContent = initial;
        }
    } else {
        profileAvatar.textContent = '👤';
    }
}

// ─── AUTH ───
onAuthStateChanged(auth, user => {
    updateProfile(user);
    updateCartBadge();
    updateNotifBadge();
});

// ─── INIT ───
renderRecentSearches();
loadShops();

console.log('🚀 Shop Listing — Premium Design with Search, Filters & Real-time Data');
</script>
