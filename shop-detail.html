<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d0d0d">
    <title>Shop Detail - Simha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f4f7fb;
            color: #0d0d0d;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: manipulation;
        }

        .app {
            width: 100%;
            height: 100%;
            margin: 0 auto;
            background: #f4f7fb;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            background: #0d0d0d;
            padding: 8px 14px 12px;
            flex-shrink: 0;
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-top .brand {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-top .brand h1 {
            font-size: 17px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.3px;
        }
        .header-top .brand h1 span { color: #7dd3c4; }
        .header-top .back-btn {
            color: #fff;
            font-size: 20px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
            cursor: pointer;
            min-height: 36px;
            min-width: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-top .back-btn:active { background: rgba(255,255,255,0.1); }

        .header-top .actions {
            display: flex;
            gap: 4px;
        }
        .header-top .actions button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            position: relative;
            min-width: 36px;
            min-height: 36px;
        }
        .header-top .actions button:active { background: rgba(255,255,255,0.2); }
        .header-top .actions button .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #e63b2e;
            color: #fff;
            font-size: 8px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid #0d0d0d;
        }
        .header-top .actions button .badge.show { display: flex; }

        /* ── MAIN CONTENT ── */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px 64px;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .main::-webkit-scrollbar { width: 0; display: none; }

        .shop-cover {
            width: 100%;
            height: 160px;
            border-radius: 12px;
            overflow: hidden;
            background: #e9ebee;
            margin-bottom: 12px;
            position: relative;
        }
        .shop-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .shop-cover .status-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            backdrop-filter: blur(4px);
            background: rgba(0,0,0,0.6);
            color: #fff;
        }
        .shop-cover .status-badge.open { background: rgba(0,170,0,0.8); }
        .shop-cover .status-badge.closed { background: rgba(208,0,0,0.8); }

        .shop-info-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e8ecf0;
            padding: 16px 18px;
            margin-bottom: 12px;
        }
        .shop-info-card .shop-header {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .shop-info-card .shop-header .shop-logo {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            overflow: hidden;
            background: #e9ebee;
            flex-shrink: 0;
            border: 2px solid #e8ecf0;
        }
        .shop-info-card .shop-header .shop-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .shop-info-card .shop-header .shop-name-area {
            flex: 1;
        }
        .shop-info-card .shop-header .shop-name-area .s-name {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .shop-info-card .shop-header .shop-name-area .s-category {
            font-size: 12px;
            color: #6b727a;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .shop-info-card .shop-header .s-rating {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 600;
            color: #f59e0b;
            background: #fef3c7;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .shop-info-card .shop-header .s-rating .cnt {
            font-size: 11px;
            font-weight: 400;
            color: #6b727a;
        }

        .shop-info-card .s-details {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 16px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f2f5;
        }
        .shop-info-card .s-details .detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #6b727a;
        }
        .shop-info-card .s-details .detail-item .icon { font-size: 14px; flex-shrink: 0; }
        .shop-info-card .s-details .detail-item .val { color: #0d0d0d; font-weight: 500; }

        .shop-info-card .s-description {
            font-size: 13px;
            color: #6b727a;
            line-height: 1.6;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f0f2f5;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 4px;
        }

        .product-card {
            background: #fff;
            border-radius: 10px;
            border: 1px solid #e8ecf0;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }
        .product-card:active { transform: scale(0.97); }

        .prod-img {
            position: relative;
            overflow: hidden;
            background: #e9ebee;
            width: 100%;
            padding-bottom: 100%;
        }
        .prod-img img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .prod-img .badge-stock {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 7px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 10px;
            z-index: 2;
        }
        .prod-img .badge-stock.out { background: rgba(208,0,0,0.8); }
        .prod-img .badge-stock.low { background: rgba(200,120,0,0.8); }
        .prod-img .badge-sale {
            position: absolute;
            top: 4px;
            left: 4px;
            background: #e63b2e;
            color: #fff;
            font-size: 7px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
            z-index: 2;
        }
        .prod-img .badge-disc {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 7px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 10px;
            z-index: 2;
        }

        .prod-body { padding: 8px 10px 10px; }
        .prod-body .prod-name {
            font-weight: 600;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .prod-body .prod-meta {
            font-size: 9px;
            color: #6b727a;
            margin-top: 1px;
        }
        .prod-body .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }
        .prod-body .price-row .price {
            font-size: 13px;
            font-weight: 700;
        }
        .prod-body .price-row .orig {
            font-size: 9px;
            color: #6b727a;
            text-decoration: line-through;
            margin-left: 3px;
        }
        .prod-body .add-btn {
            background: #0d0d0d;
            color: #fff;
            padding: 3px 10px;
            border-radius: 16px;
            font-size: 9px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 2px;
            transition: opacity 0.2s, transform 0.2s;
            min-height: 26px;
            cursor: pointer;
            border: none;
        }
        .prod-body .add-btn:active:not(:disabled) { transform: scale(0.93); }
        .prod-body .add-btn:disabled { background: #c4c8ce; cursor: not-allowed; opacity: 0.6; }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
            .shop-cover { height: 200px; }
            .shop-info-card .shop-header .shop-logo { width: 76px; height: 76px; }
            .shop-info-card .shop-header .shop-name-area .s-name { font-size: 20px; }
        }
        @media (min-width: 1024px) {
            .product-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
            .shop-cover { height: 240px; }
            .shop-info-card .shop-header .shop-logo { width: 88px; height: 88px; }
            .shop-info-card .shop-header .shop-name-area .s-name { font-size: 24px; }
        }
        @media (max-width: 480px) {
            .shop-cover { height: 120px; }
            .shop-info-card .shop-header .shop-logo { width: 52px; height: 52px; }
            .shop-info-card .shop-header .shop-name-area .s-name { font-size: 16px; }
            .product-grid { gap: 8px; }
            .prod-body .prod-name { font-size: 11px; }
            .prod-body .price-row .price { font-size: 12px; }
            .prod-body .add-btn { font-size: 8px; padding: 2px 8px; min-height: 22px; }
        }

        #toastContainer {
            position: absolute;
            bottom: 64px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 90%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            pointer-events: none;
        }
        .toast {
            background: #1e2226;
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            font-size: 11px;
            font-weight: 500;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
            animation: slideUp 0.25s ease;
        }
        .toast.error { background: #b00020; }
        .toast.warning { background: #925700; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #6b727a;
        }
        .loading-state .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e8ecf0;
            border-top-color: #0d0d0d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #6b727a;
        }
        .empty .e-icon { font-size: 44px; display: block; margin-bottom: 8px; }
        .empty h3 { color: #0d0d0d; font-size: 16px; margin-bottom: 2px; }
        .empty p { font-size: 13px; }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 54px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(14px);
            border-top: 1px solid #e8ecf0;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding: 4px 0 6px;
            z-index: 100;
            flex-shrink: 0;
        }
        .bn-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-size: 8px;
            font-weight: 500;
            color: #6b727a;
            cursor: pointer;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            min-width: 44px;
            min-height: 36px;
            padding: 2px 6px;
            border-radius: 8px;
            transition: color 0.2s;
            position: relative;
        }
        .bn-item.active { color: #0d0d0d; }
        .bn-item .bn-icon { font-size: 17px; }
        .bn-item .badge {
            position: absolute;
            top: 0;
            right: 2px;
            background: #e63b2e;
            color: #fff;
            font-size: 7px;
            font-weight: 700;
            min-width: 12px;
            height: 12px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 2px;
        }
        .bn-item .badge.show { display: flex; }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>

<div class="app">

    <!-- HEADER -->
    <header class="header">
        <div class="header-top">

<script type="module">
import { initializeApp } from 'firebase/app';
import { getAuth, onAuthStateChanged } from 'firebase/auth';
import {
    getFirestore, collection, doc, getDocs, getDoc,
    query, where, orderBy, serverTimestamp, updateDoc, setDoc
} from 'firebase/firestore';

const firebaseConfig = {
    apiKey: "AIzaSyDJLnUB8XnXWPEtSRAMuQr9ASmD16HLIJc",
    authDomain: "bishalshrestha17-de676.firebaseapp.com",
    projectId: "bishalshrestha17-de676",
    storageBucket: "bishalshrestha17-de676.firebasestorage.app",
    messagingSenderId: "631628771230",
    appId: "1:631628771230:web:389c6430535f6a46b6708f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $ = id => document.getElementById(id);
const shopCover = $('shopCover');
const shopInfoCard = $('shopInfoCard');
const shopProducts = $('shopProducts');
const cartBadgeEl = $('cartBadge');
const notifBadgeEl = $('notifBadge');

function showToast(msg, type = 'success') {
    const c = $('toastContainer');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    const icons = { success: '✅', error: '❌', warning: '⚠️' };
    t.innerHTML = `<span>${icons[type]||'ℹ️'}</span> ${msg}`;
    c.appendChild(t);
    setTimeout(() => {
        t.style.transition = 'opacity 0.3s,transform 0.3s';
        t.style.opacity = '0';
        t.style.transform = 'translateY(10px)';
        setTimeout(() => t.remove(), 300);
    }, 2500);
}
window.showToast = showToast;

function getShopId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('shopId') || params.get('id');
}

window.addToCart = async function(productId, productName) {
    const user = auth.currentUser;
    if (!user) { showToast('Please login', 'error'); window.location.href = 'auth.html'; return; }
    try {
        const pd = await getDoc(doc(db, 'products', productId));
        if (!pd.exists()) return showToast('Product not found', 'error');
        const p = pd.data();
        if (p.stock <= 0) return showToast('Out of stock!', 'error');
        const cartRef = doc(db, 'cart', user.uid);
        const cartDoc = await getDoc(cartRef);
        const item = {
            productId,
            shopId: p.shopId,
            shopName: p.shopName || 'Shop',
            productName: p.productName || 'Product',
            price: p.discountPrice || p.price || 0,
            originalPrice: p.price || 0,
            qty: 1,
            unit: p.unit || '',
            imageURL: p.imageURL || ''
        };
        if (cartDoc.exists()) {
            const items = cartDoc.data().items || [];
            const idx = items.findIndex(i => i.productId === productId);
            idx >= 0 ? items[idx].qty++ : items.push(item);
            await updateDoc(cartRef, { items, updatedAt: serverTimestamp() });
        } else {
            await setDoc(cartRef, { items: [item], createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
        }
        if (navigator.vibrate) navigator.vibrate(20);
        showToast(`${item.productName} added to cart 🛒`, 'success');
        updateCartBadge();
    } catch (err) { showToast('Failed to add to cart', 'error'); }
};

async function loadShop() {
    const shopId = getShopId();
    if (!shopId) {
        shopInfoCard.innerHTML = `
            <div class="empty">
                <span class="e-icon">🔍</span>
                <h3>Shop not found</h3>
                <p>Invalid shop ID</p>
                <button onclick="window.location.href='index.html'" style="margin-top:12px;padding:8px 20px;background:#0d0d0d;color:#fff;border-radius:20px;font-weight:600;border:none;cursor:pointer;">Go Home</button>
            </div>
        `;
        shopCover.innerHTML = '';
        shopProducts.innerHTML = '';
        return;
    }

    try {
        const shopDoc = await getDoc(doc(db, 'shops', shopId));
        if (!shopDoc.exists()) {
            shopInfoCard.innerHTML = `
                <div class="empty">
                    <span class="e-icon">🏪</span>
                    <h3>Shop not found</h3>
                    <p>This shop doesn't exist or was removed.</p>
                    <button onclick="window.location.href='index.html'" style="margin-top:12px;padding:8px 20px;background:#0d0d0d;color:#fff;border-radius:20px;font-weight:600;border:none;cursor:pointer;">Go Home</button>
                </div>
            `;
            shopCover.innerHTML = '';
            shopProducts.innerHTML = '';
            return;
        }

        const shop = shopDoc.data();
        renderShop(shop);
        loadShopProducts(shopId);

    } catch (error) {
        console.error('Error loading shop:', error);
        shopInfoCard.innerHTML = `
            <div class="empty">
                <span class="e-icon">⚠️</span>
                <h3>Error loading shop</h3>
                <p>${error.message}</p>
                <button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:#0d0d0d;color:#fff;border-radius:20px;font-weight:600;border:none;cursor:pointer;">🔄 Retry</button>
            </div>
        `;
        shopCover.innerHTML = '';
        shopProducts.innerHTML = '';
    }
}

function renderShop(shop) {
    const isOpen = shop.isOpen !== false;
    const coverImage = shop.shopPhotoURL || 'https://picsum.photos/seed/' + encodeURIComponent(shop.shopId || shop.id) + '/800/300';
    const logoImage = shop.logoURL || 'https://picsum.photos/seed/' + encodeURIComponent(shop.shopId || shop.id) + '/200/200';
    const rating = shop.rating || 0;
    const reviewCount = shop.reviewCount || 0;
    const verified = shop.isVerified || false;

    shopCover.innerHTML = `
        <img src="${coverImage}" alt="${shop.shopName || 'Shop Cover'}" loading="lazy" onerror="this.src='https://picsum.photos/800/300'">
        <span class="status-badge ${isOpen ? 'open' : 'closed'}">${isOpen ? '🟢 Open' : '🔴 Closed'}</span>
    `;

    shopInfoCard.innerHTML = `
        <div class="shop-header">
            <div class="shop-logo">
                <img src="${logoImage}" alt="${shop.shopName || 'Shop Logo'}" loading="lazy" onerror="this.src='https://picsum.photos/200/200'">
            </div>
            <div class="shop-name-area">
                <div class="s-name">${shop.shopName || 'Shop Name'} ${verified ? '✅' : ''}</div>
                <div class="s-category">${shop.category || 'General Store'} ${rating > 0 ? `• ⭐ ${rating.toFixed(1)} (${reviewCount})` : ''}</div>
            </div>
            ${rating > 0 ? `<div class="s-rating">⭐ ${rating.toFixed(1)} <span class="cnt">(${reviewCount})</span></div>` : ''}
        </div>
        <div class="s-details">
            <div class="detail-item"><span class="icon">📍</span> <span class="val">${shop.address || ''}${shop.district ? ', ' + shop.district : ''}</span></div>
            <div class="detail-item"><span class="icon">📞</span> <span class="val">${shop.phone || 'N/A'}</span></div>
            <div class="detail-item"><span class="icon">🕐</span> <span class="val">${shop.openTime || '9:00 AM'} - ${shop.closeTime || '9:00 PM'}</span></div>
            <div class="detail-item"><span class="icon">📧</span> <span class="val">${shop.email || 'N/A'}</span></div>
        </div>
        ${shop.description ? `<div class="s-description">${shop.description}</div>` : ''}
    `;
}

async function loadShopProducts(shopId) {
    try {
        const q = query(
            collection(db, 'products'),
            where('shopId', '==', shopId)
        );
        const snap = await getDocs(q);
        let products = snap.docs.map(d => ({ id: d.id, ...d.data() }));

        products = products.filter(p => p.isActive !== false);
        products.sort((a, b) => {
            const dateA = a.createdAt?.seconds || 0;
            const dateB = b.createdAt?.seconds || 0;
            return dateB - dateA;
        });

        if (products.length === 0) {
            shopProducts.innerHTML = `
                <div class="empty" style="grid-column:1/-1;">
                    <span class="e-icon">📦</span>
                    <h3>No products yet</h3>
                    <p>This shop hasn't added any products.</p>
                </div>
            `;
            return;
        }

        shopProducts.innerHTML = products.map(p => productCard(p)).join('');

    } catch (error) {
        console.error('Error loading shop products:', error);
        shopProducts.innerHTML = `
            <div class="empty" style="grid-column:1/-1;">
                <span class="e-icon">⚠️</span>
                <h3>Failed to load products</h3>
                <p>${error.message}</p>
                <button onclick="location.reload()" style="margin-top:12px;padding:8px 20px;background:#0d0d0d;color:#fff;border-radius:20px;font-weight:600;border:none;cursor:pointer;">🔄 Retry</button>
            </div>
        `;
    }
}

function productCard(p) {
    const finalPrice = p.discountPrice || p.price || 0;
    const stock = p.stock || 0;
    const stockClass = stock <= 0 ? 'out' : (stock < 5 ? 'low' : '');
    const discount = p.discountPercent || (p.discountPrice ? Math.round((1 - p.discountPrice / p.price) * 100) : 0);
    const hasSale = p.onSale || discount > 0;
    const imageURL = p.imageURL || 'https://picsum.photos/seed/' + encodeURIComponent(p.productName || p.id) + '/400/400';
    const isOutOfStock = stock <= 0;

    return `
        <div class="product-card" onclick="window.location.href='product-detail.html?productId=${p.id}'">
            <div class="prod-img">
                <img src="${imageURL}" alt="${p.productName || 'Product'}" loading="lazy" onerror="this.src='https://picsum.photos/400/400'">
                <span class="badge-stock ${stockClass}">${isOutOfStock ? 'Out' : stock + ' left'}</span>
                ${hasSale ? `<span class="badge-sale">SALE</span>` : ''}
                ${discount > 0 ? `<span class="badge-disc">-${discount}%</span>` : ''}
            </div>
            <div class="prod-body">
                <div class="prod-name">${p.productName || 'Product'}</div>
                <div class="prod-meta">${p.unit || ''}</div>
                <div class="price-row">
                    <span>
                        <span class="price">Rs. ${finalPrice.toLocaleString()}</span>
                        ${p.discountPrice ? `<span class="orig">Rs. ${(p.price || 0).toLocaleString()}</span>` : ''}
                    </span>
                    <button class="add-btn" onclick="event.stopPropagation(); addToCart('${p.id}', '${p.productName}')" ${isOutOfStock ? 'disabled' : ''}>
                        + Add
                    </button>
                </div>
            </div>
        </div>
    `;
}

async function updateCartBadge() {
    const user = auth.currentUser;
    if (!user) { cartBadgeEl.classList.remove('show'); return; }
    try {
        const c = await getDoc(doc(db, 'cart', user.uid));
        const count = c.exists() ? (c.data().items || []).reduce((s, i) => s + (i.qty || 0), 0) : 0;
        cartBadgeEl.textContent = count > 99 ? '99+' : count;
        cartBadgeEl.classList.toggle('show', count > 0);
    } catch {}
}

async function updateNotifBadge() {
    const user = auth.currentUser;
    if (!user) { notifBadgeEl.classList.remove('show'); return; }
    try {
        const ud = await getDoc(doc(db, 'users', user.uid));
        if (!ud.exists()) return;
        const read = ud.data().readNotifications || [];
        const ns = await getDocs(query(collection(db, 'notifications'), where('isActive', '==', true)));
        const unread = ns.size - read.length;
        notifBadgeEl.textContent = unread > 99 ? '99+' : unread;
        notifBadgeEl.classList.toggle('show', unread > 0);
    } catch {}
}

onAuthStateChanged(auth, user => { updateCartBadge(); updateNotifBadge(); });

loadShop();

console.log('🦁 Simha — Shop Detail Page (No Status Bar, Full Responsive)');
</script>
